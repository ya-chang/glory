<body>

  <div class="topbar-inner">
    <a href="community.html" class="topbar-brand"><img src="favicon.png" alt="荣耀" class="brand-icon"> 荣耀社区</a>
    <button class="menu-toggle" onclick="document.querySelector('.topbar-nav').classList.toggle('open')">☰</button>
    <nav class="topbar-nav">
      <a href="community.html">首页</a>
      <a href="players.html">选手百科</a>
      <a href="teams.html">战队阵容</a>
      <a href="forum-home.html">讨论区</a>
      <a href="oc-home.html">OC中心</a>
    </nav>

      <a href="notifications.html" class="nav-text-btn">通知</a>
      <a href="profile.html" class="nav-text-btn">我的</a>

    </div>

</header>

<div class="page-header">
  <div class="container">
    <h1>🔍 全站搜索</h1>
    <p>搜索选手、帖子、OC 角色</p>
  </div>
</div>

<div class="container">

  <!-- 搜索栏 -->
  <div class="search-bar-wrap">
    <form class="search-bar" onsubmit="doSearch(event)">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="输入关键词搜索..." autocomplete="off" autofocus>
      <button type="submit" class="search-btn">搜索</button>
    </form>
  </div>

  <!-- 筛选标签 -->
  <div class="search-tabs" id="searchTabs">
    <button class="search-tab active" data-filter="all" onclick="setFilter('all')">全部</button>
    <button class="search-tab" data-filter="player" onclick="setFilter('player')">👤 选手</button>
    <button class="search-tab" data-filter="post" onclick="setFilter('post')">💬 帖子</button>
    <button class="search-tab" data-filter="oc" onclick="setFilter('oc')">🧑‍🎨 OC</button>
  </div>

  <!-- 搜索结果统计 -->
  <div class="search-stats" id="searchStats" style="display:none;">
    找到 <strong id="resultCount">0</strong> 个结果
  </div>

  <!-- 搜索结果列表 -->
  <div id="searchResults"></div>

  <!-- 初始状态 / 空结果 -->
  <div class="search-empty" id="searchEmpty">
    <div class="search-empty-icon">🔍</div>
    <p>输入关键词开始搜索</p>
    <div class="search-hot">
      <span class="search-hot-label">热门搜索：</span>
      <button class="search-hot-tag" onclick="quickSearch('叶修')">叶修</button>
      <button class="search-hot-tag" onclick="quickSearch('黄少天')">黄少天</button>
      <button class="search-hot-tag" onclick="quickSearch('兴欣')">兴欣</button>
      <button class="search-hot-tag" onclick="quickSearch('战斗法师')">战斗法师</button>
      <button class="search-hot-tag" onclick="quickSearch('蓝雨')">蓝雨</button>
    </div>
  </div>

  <div class="search-no-result" id="searchNoResult" style="display:none;">
    <div class="search-empty-icon">😢</div>
    <p>没有找到相关结果</p>
    <span>换个关键词试试？</span>
  </div>

</div>

<footer class="footer">
  <p>🏆 荣耀社区 · 全职高手同人站</p>
</footer>

<script src="players.js?v=2"></script>
<script src="common.js?v=2"></script>
<script src="forum.js?v=2"></script>
<script src="common.js?v=2"></script>
<script src="oc.js?v=2"></script>
<script>
  let currentFilter = 'all';
  let lastQuery = '';

  // 从 URL 获取初始查询
  const urlParams = new URLSearchParams(window.location.search);
  const initQuery = urlParams.get('q') || '';
  if (initQuery) {
    document.getElementById('searchInput').value = initQuery;
    doSearch();
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.search-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === filter);
    });
    if (lastQuery) doSearch();
  }

  async function doSearch(e) {
    if (e) e.preventDefault();
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    lastQuery = query;

    // 更新 URL
    const url = new URL(window.location);
    url.searchParams.set('q', query);
    history.replaceState(null, '', url);

    const results = await searchAll(query);
    renderResults(results, query);
  }

  function quickSearch(q) {
    document.getElementById('searchInput').value = q;
    doSearch();
  }

  async function searchAll(query) {
    const q = query.toLowerCase();
    let results = [];

    // 搜索选手（静态数据）
    if (currentFilter === 'all' || currentFilter === 'player') {
      PLAYERS.forEach(p => {
        const score = matchScore(q, [
          p.name, p.gameId, p.class, p.team, p.bio || '', p.teamShort || ''
        ]);
        if (score > 0) {
          results.push({
            type: 'player',
            score,
            data: p,
            title: p.name,
            subtitle: p.gameId.split('/')[0].trim(),
            meta: `${p.class.split('/')[0].split('（')[0]} · ${p.team.split('→').pop()} · ${p.status}`,
            link: `player-detail.html?id=${p.id}`,
            avatar: p.avatar
          });
        }
      });
    }

    // 搜索帖子（API）
    if (currentFilter === 'all' || currentFilter === 'post') {
      try {
        const posts = await getAllPosts();
        posts.forEach(p => {
          const cat = getCategoryById(p.category);
          const catName = cat ? cat.name : '';
          const tags = (p.tags || []).join(' ');
          const score = matchScore(q, [p.title, p.content, catName, tags, p.authorName]);
          if (score > 0) {
            results.push({
              type: 'post',
              score,
              data: p,
              title: p.title,
              subtitle: userLinkHtml(p.authorId, p.authorName),
              meta: `${cat ? cat.icon + ' ' + cat.name : ''} · 💬${p.replyCount} 👍${p.likeCount}`,
              link: `post-detail.html?id=${p.id}`,
              excerpt: (p.content || '').slice(0, 120),
              isPinned: p.isPinned
            });
          }
        });
      } catch (e) { console.error('search posts error:', e); }
    }

    // 搜索 OC（API）
    if (currentFilter === 'all' || currentFilter === 'oc') {
      try {
        const ocs = await getAllOCs();
        ocs.filter(oc => oc.status === 'active').forEach(oc => {
          const score = matchScore(q, [
            oc.name, oc.gameId, oc.class, oc.team, oc.bio || '',
            oc.creatorName || '', oc.weapon || '', oc.combatStyle || ''
          ]);
          if (score > 0) {
            results.push({
              type: 'oc',
              score,
              data: oc,
              title: oc.name,
              subtitle: oc.gameId,
              meta: `${oc.class} · ${oc.team} · 创建者：${oc.creatorName || '匿名'}`,
              link: `oc-detail.html?id=${oc.id}`,
              avatar: oc.avatar
            });
          }
        });
      } catch (e) { console.error('search ocs error:', e); }
    }

    // 按相关度排序
    results.sort((a, b) => b.score - a.score);
    return results;
  }

  function matchScore(query, fields) {
    let score = 0;
    for (const field of fields) {
      if (!field) continue;
      const f = field.toLowerCase();
      if (f === query) {
        score += 100;
      } else if (f.includes(query)) {
        score += 50;
      } else {
        // 部分匹配：每个匹配的词加分
        const words = query.split(/\s+/);
        for (const w of words) {
          if (w && f.includes(w)) score += 10;
        }
      }
    }
    return score;
  }

  function highlightText(text, query) {
    if (!text || !query) return escapeForumHtml(text || '');
    const escaped = escapeForumHtml(text);
    const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
  }

  function renderResults(results, query) {
    const container = document.getElementById('searchResults');
    const statsEl = document.getElementById('searchStats');
    const emptyEl = document.getElementById('searchEmpty');
    const noResultEl = document.getElementById('searchNoResult');

    emptyEl.style.display = 'none';

    if (results.length === 0) {
      container.innerHTML = '';
      statsEl.style.display = 'none';
      noResultEl.style.display = 'block';
      return;
    }

    noResultEl.style.display = 'none';
    statsEl.style.display = 'block';
    document.getElementById('resultCount').textContent = results.length;

    let html = '';
    results.forEach(r => {
      html += `<a href="${r.link}" class="search-result-item search-result-${r.type}">`;

      // 头像 / 图标
      if (r.type === 'player') {
        html += `<div class="search-result-avatar player-avatar">${r.avatar}</div>`;
      } else if (r.type === 'oc') {
        html += `<div class="search-result-avatar oc-avatar">${r.avatar ? '' : r.data.gameId[0]}</div>`;
      } else {
        html += `<div class="search-result-avatar post-avatar">${r.isPinned ? '📌' : '💬'}</div>`;
      }

      html += '<div class="search-result-body">';

      // 类型标签
      const typeLabel = r.type === 'player' ? '👤 选手' : r.type === 'post' ? '💬 帖子' : '🧑‍🎨 OC';
      html += `<span class="search-result-type">${typeLabel}</span>`;

      // 标题
      html += `<div class="search-result-title">${highlightText(r.title, query)}</div>`;

      // 摘要（帖子有）
      if (r.excerpt) {
        const clean = r.excerpt.replace(/\n/g, ' ');
        html += `<div class="search-result-excerpt">${highlightText(clean, query)}</div>`;
      }

      // 副标题 + meta
      html += `<div class="search-result-meta">`;
      html += `<span class="search-result-sub">${r.subtitle}</span>`;
      if (r.meta) html += `<span class="search-result-info">${r.meta}</span>`;
      html += `</div>`;

      html += '</div></a>';
    });

    container.innerHTML = html;
  }

  // 键盘快捷键：按 / 聚焦搜索框
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
</script>

<style>
  /* 搜索栏 */
  .search-bar-wrap {
    padding: 24px 0 16px;
  }
  .search-bar {
    display: flex; align-items: center; gap: 0;
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border var(--transition);
  }
  .search-bar:focus-within {
    border-color: var(--blue-3);
    box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
  }
  .search-icon {
    padding: 0 4px 0 16px;
    font-size: 18px;
    color: var(--text-3);
    flex-shrink: 0;
  }
  .search-bar input {
    flex: 1;
    padding: 14px 12px;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: inherit;
    background: transparent;
    color: var(--text);
  }
  .search-bar input::placeholder {
    color: var(--text-3);
  }
  .search-btn {
    padding: 10px 24px;
    margin: 4px;
    border: none;
    border-radius: 8px;
    background: var(--blue-3);
    color: var(--white);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background var(--transition);
    flex-shrink: 0;
  }
  .search-btn:hover {
    background: var(--blue-2);
  }

  /* 筛选标签 */
  .search-tabs {
    display: flex; gap: 8px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .search-tab {
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--text-2);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
  }
  .search-tab:hover {
    border-color: var(--blue-4);
    color: var(--blue-3);
  }
  .search-tab.active {
    background: var(--blue-3);
    color: var(--white);
    border-color: var(--blue-3);
  }

  /* 结果统计 */
  .search-stats {
    font-size: 14px;
    color: var(--text-3);
    padding-bottom: 16px;
  }
  .search-stats strong {
    color: var(--blue-3);
    font-weight: 700;
  }

  /* 结果项 */
  .search-result-item {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: all var(--transition);
  }
  .search-result-item:hover {
    border-color: var(--blue-4);
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }

  .search-result-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }
  .search-result-player .search-result-avatar {
    background: linear-gradient(135deg, var(--blue-5), var(--green-5));
    color: var(--blue-2);
  }
  .search-result-post .search-result-avatar {
    background: var(--bg);
    color: var(--text-3);
    font-size: 16px;
  }
  .search-result-oc .search-result-avatar {
    background: linear-gradient(135deg, #f3e5f5, #e8eaf6);
    color: #6a1b9a;
  }

  .search-result-body {
    flex: 1; min-width: 0;
  }
  .search-result-type {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .search-result-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin: 2px 0 4px;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .search-result-title mark {
    background: #fff3cd;
    color: inherit;
    padding: 0 2px;
    border-radius: 2px;
  }
  .search-result-excerpt {
    font-size: 13px;
    color: var(--text-3);
    line-height: 1.5;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .search-result-excerpt mark {
    background: #fff3cd;
    color: inherit;
    padding: 0 2px;
    border-radius: 2px;
  }
  .search-result-meta {
    display: flex; flex-wrap: wrap; gap: 8px;
    font-size: 12px; color: var(--text-3);
  }
  .search-result-sub {
    font-weight: 600;
    color: var(--text-2);
  }

  /* 按类型加左边框色 */
  .search-result-player { border-left: 3px solid var(--blue-3); }
  .search-result-post { border-left: 3px solid var(--green-3); }
  .search-result-oc { border-left: 3px solid #9c27b0; }

  /* 空状态 */
  .search-empty, .search-no-result {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-3);
  }
  .search-empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }
  .search-empty p, .search-no-result p {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-2);
  }
  .search-no-result span {
    font-size: 14px;
  }

  /* 热门搜索 */
  .search-hot {
    margin-top: 24px;
    display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px;
  }
  .search-hot-label {
    font-size: 13px;
    color: var(--text-3);
  }
  .search-hot-tag {
    padding: 5px 14px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--text-2);
    font-size: 13px;
    cursor: pointer;
    transition: all var(--transition);
  }
  .search-hot-tag:hover {
    border-color: var(--blue-3);
    color: var(--blue-3);
    background: var(--blue-5);
  }

  /* OC 头像（无图片时） */
  .oc-avatar {
    background: linear-gradient(135deg, #f3e5f5, #e8eaf6);
    color: #6a1b9a;
    font-size: 20px;
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .search-bar-wrap { padding: 16px 0 12px; }
    .search-bar input { font-size: 15px; padding: 12px 10px; }
    .search-btn { padding: 8px 18px; font-size: 14px; }
    .search-result-item { padding: 14px; }
    .search-result-avatar { width: 38px; height: 38px; font-size: 16px; }
    .search-result-title { font-size: 15px; }
  }
</style>
</body>
