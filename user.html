<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户主页 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
<meta property="og:title" content="用户主页 · 荣耀社区">
<meta property="og:description" content="查看 TA 的帖子和 OC 角色">
<meta property="og:image" content="https://ya-chang.github.io/glory/favicon.png">
<meta property="og:type" content="profile">
</head>
<body data-page="profile">

<div id="app-header"></div>

<div class="profile-hero">
  <div class="container">
    <div class="profile-header">
      <div class="profile-avatar" id="userAvatar">荣</div>
      <div class="profile-info">
        <h1 id="userName">加载中...</h1>
        <div class="profile-join">📅 加入于 <span id="userJoinDate">-</span></div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="profile-body">
    <!-- 左侧：统计 -->
    <div class="profile-side">
      <div class="info-card">
        <h2>📊 数据统计</h2>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-num" id="statPosts">0</div>
            <div class="stat-label">帖子</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="statOCs">0</div>
            <div class="stat-label">OC</div>
          </div>
        </div>
      </div>

      <div class="info-card" id="bioCard" style="display:none;">
        <h2>💬 个人简介</h2>
        <p id="userBio" style="color:var(--text-2);font-size:14px;line-height:1.6;"></p>
      </div>

      <div class="info-card" id="favCard" style="display:none;">
        <h2>⭐ 偏好</h2>
        <div id="userFav" style="font-size:14px;color:var(--text-2);"></div>
      </div>
    </div>

    <!-- 右侧：内容 -->
    <div class="profile-main">
      <div class="profile-tabs">
        <button class="profile-tab active" data-tab="posts">📝 TA 的帖子</button>
        <button class="profile-tab" data-tab="ocs">🧑‍🎨 TA 的 OC</button>
      </div>

      <div class="profile-tab-content active" id="tab-posts">
        <div id="userPosts"><p style="color:var(--text-3);padding:20px 0;text-align:center;">加载中...</p></div>
      </div>

      <div class="profile-tab-content" id="tab-ocs">
        <div id="userOCs"><p style="color:var(--text-3);padding:20px 0;text-align:center;">加载中...</p></div>
      </div>
    </div>
  </div>
</div>

<div id="app-footer"></div>

<script src="common.js?v=2"></script>
<script src="layout.js"></script>
<script src="forum.js?v=2"></script>
<script src="oc.js?v=2"></script>
<script src="page-user.js"></script>

<style>
  .profile-hero {
    background: linear-gradient(135deg, var(--blue-1) 0%, var(--green-2) 100%);
    color: var(--white);
    padding: 40px 24px 48px;
  }
  .profile-header {
    display: flex; align-items: center; gap: 24px;
    max-width: 1200px; margin: 0 auto;
  }
  .profile-avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 3px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; font-weight: 700;
    flex-shrink: 0;
    overflow: hidden;
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-info { flex: 1; }
  .profile-info h1 { font-size: 28px; font-weight: 700; }
  .profile-title {
    font-size: 14px; opacity: 0.85;
    margin-top: 4px;
    display: inline-block;
    padding: 2px 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
  }
  .profile-join { font-size: 13px; opacity: 0.7; margin-top: 8px; }

  .profile-body {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    padding: 24px 0 48px;
  }
  .profile-side { display: flex; flex-direction: column; gap: 20px; }
  .profile-main { min-width: 0; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-item {
    text-align: center;
    padding: 14px 8px;
    background: var(--bg);
    border-radius: 8px;
  }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--blue-3); line-height: 1.2; }
  .stat-label { font-size: 12px; color: var(--text-3); margin-top: 4px; }

  .profile-tabs {
    display: flex; gap: 4px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 20px;
  }
  .profile-tab {
    padding: 10px 20px;
    font-size: 14px; font-weight: 500;
    border: none; background: none;
    color: var(--text-3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    font-family: inherit;
  }
  .profile-tab:hover { color: var(--blue-3); }
  .profile-tab.active { color: var(--blue-3); border-bottom-color: var(--blue-3); font-weight: 600; }
  .profile-tab-content { display: none; }
  .profile-tab-content.active { display: block; }

  @media (max-width: 768px) {
    .profile-header { flex-direction: column; text-align: center; }
    .profile-body { grid-template-columns: 1fr; }
    .profile-side { order: 2; }
    .profile-main { order: 1; }
    .profile-tabs { overflow-x: auto; }
    .profile-tab { white-space: nowrap; padding: 10px 14px; font-size: 13px; }
  }
</style>
</body>
</html>
