<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户主页 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
<meta property="og:title" content="用户主页 · 荣耀社区">
<meta property="og:description" content="查看 TA 的帖子和 OC 角色">
<meta property="og:image" content="https://ya-chang.github.io/glory/favicon.png">
<meta property="og:type" content="profile">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="community.html" class="topbar-brand"><img src="favicon.png" alt="荣耀" class="brand-icon"> 荣耀社区</a>
    <button class="menu-toggle" onclick="document.querySelector('.topbar-nav').classList.toggle('open')">☰</button>
    <nav class="topbar-nav">
      <a href="community.html">首页</a>
      <a href="players.html">选手百科</a>
      <a href="teams.html">战队阵容</a>
      <a href="forum-home.html">讨论区</a>
      <a href="oc-home.html">OC中心</a>
    </nav>
    <div class="topbar-right">
      <a href="search.html" class="nav-text-btn">搜索</a>
      <a href="notifications.html" class="nav-text-btn">通知</a>
      <a href="profile.html" class="nav-text-btn">我的</a>
      <a href="index.html" class="btn-logout">退出</a>
    </div>
  </div>
</header>

<div class="profile-hero">
  <div class="container">
    <div class="profile-header">
      <div class="profile-avatar" id="userAvatar">荣</div>
      <div class="profile-info">
        <h1 id="userName">加载中...</h1>
        <div class="profile-title" id="userTitle">-</div>
        <div class="profile-join">📅 加入于 <span id="userJoinDate">-</span></div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="profile-body">
    <!-- 左侧：统计 -->
    <div class="profile-side">
      <div class="info-card">
        <h2>📊 数据统计</h2>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-num" id="statPosts">0</div>
            <div class="stat-label">帖子</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="statOCs">0</div>
            <div class="stat-label">OC</div>
          </div>
        </div>
      </div>

      <div class="info-card" id="bioCard" style="display:none;">
        <h2>💬 个人简介</h2>
        <p id="userBio" style="color:var(--text-2);font-size:14px;line-height:1.6;"></p>
      </div>

      <div class="info-card" id="favCard" style="display:none;">
        <h2>⭐ 偏好</h2>
        <div id="userFav" style="font-size:14px;color:var(--text-2);"></div>
      </div>
    </div>

    <!-- 右侧：内容 -->
    <div class="profile-main">
      <div class="profile-tabs">
        <button class="profile-tab active" data-tab="posts">📝 TA 的帖子</button>
        <button class="profile-tab" data-tab="ocs">🧑‍🎨 TA 的 OC</button>
      </div>

      <div class="profile-tab-content active" id="tab-posts">
        <div id="userPosts"><p style="color:var(--text-3);padding:20px 0;text-align:center;">加载中...</p></div>
      </div>

      <div class="profile-tab-content" id="tab-ocs">
        <div id="userOCs"><p style="color:var(--text-3);padding:20px 0;text-align:center;">加载中...</p></div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>🏆 荣耀社区 · 全职高手同人站</p>
</footer>

<script src="common.js?v=2"></script>
<script src="forum.js?v=2"></script>
<script src="common.js?v=2"></script>
<script src="oc.js?v=2"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const targetEmail = params.get('email');

  if (!targetEmail) {
    document.getElementById('userName').textContent = '参数错误';
    document.getElementById('userPosts').innerHTML = '<p style="color:var(--text-3);text-align:center;padding:20px;">缺少用户参数</p>';
  } else {
    loadUserProfile();
  }

  async function loadUserProfile() {
    try {
      const profile = await apiGet(`/api/profile/${encodeURIComponent(targetEmail)}`);
      if (!profile) {
        document.getElementById('userName').textContent = '用户不存在';
        return;
      }

      // 头像
      const avatarEl = document.getElementById('userAvatar');
      if (profile.avatar) {
        avatarEl.innerHTML = `<img src="${profile.avatar}" alt="${profile.username}">`;
      } else {
        avatarEl.textContent = (profile.username || '荣')[0];
      }

      // 基本信息
      document.getElementById('userName').textContent = profile.username || '荣耀玩家';
      document.getElementById('userJoinDate').textContent = profile.joinDate || '-';
      document.getElementById('statPosts').textContent = (profile.stats && profile.stats.posts) || 0;
      document.getElementById('statOCs').textContent = (profile.stats && profile.stats.ocs) || 0;

      // 等级
      if (profile.exp !== undefined) {
        const LEVELS = [
          { level: 1, name: '新手玩家', exp: 0 },
          { level: 2, name: '网吧常客', exp: 100 },
          { level: 3, name: '业余选手', exp: 300 },
          { level: 4, name: '职业新人', exp: 600 },
          { level: 5, name: '职业选手', exp: 1000 },
          { level: 6, name: '明星选手', exp: 2000 },
          { level: 7, name: '战队队长', exp: 3500 },
          { level: 8, name: '联盟传奇', exp: 5000 },
          { level: 9, name: '荣耀教科书', exp: 8000 },
          { level: 10, name: '荣耀之神', exp: 12000 }
        ];
        let current = LEVELS[0];
        for (let i = LEVELS.length - 1; i >= 0; i--) {
          if (profile.exp >= LEVELS[i].exp) { current = LEVELS[i]; break; }
        }
        document.getElementById('userTitle').textContent = `Lv.${current.level} · ${current.name}`;
      }

      // 简介
      if (profile.bio) {
        document.getElementById('bioCard').style.display = '';
        document.getElementById('userBio').textContent = profile.bio;
      }

      // 偏好
      const favItems = [];
      if (profile.favPlayer) favItems.push(`🎮 最喜欢的角色：${profile.favPlayer}`);
      if (profile.favTeam) favItems.push(`🏆 最喜欢的战队：${profile.favTeam}`);
      if (favItems.length > 0) {
        document.getElementById('favCard').style.display = '';
        document.getElementById('userFav').innerHTML = favItems.join('<br>');
      }

      // 加载帖子和 OC
      loadUserPosts(targetEmail);
      loadUserOCs(targetEmail);
    } catch (e) {
      console.error('loadUserProfile error:', e);
      document.getElementById('userName').textContent = '加载失败';
    }
  }

  async function loadUserPosts(email) {
    try {
      const result = await getPostsByAuthor(email);
      const userPosts = result.items || [];
      const container = document.getElementById('userPosts');

      if (userPosts.length === 0) {
        container.innerHTML = '<div class="empty-state"><div style="font-size:36px;margin-bottom:12px;">📝</div><p>还没有发过帖子</p></div>';
        return;
      }

      container.innerHTML = userPosts.map(post => {
        const cat = getCategoryById(post.category);
        return `<a class="post-item" href="post-detail.html?id=${post.id}">
          <div class="post-body">
            <div class="post-title">${escapeForumHtml(post.title)}</div>
            <div class="post-meta">
              <span>${cat ? cat.icon : '📁'} ${cat ? cat.name : '未知'}</span>
              <span class="stat">💬 ${post.replyCount}</span>
              <span class="stat">👍 ${post.likeCount}</span>
              <span class="stat">👁️ ${post.viewCount}</span>
              <span>${forumTimeAgo(post.createdAt)}</span>
            </div>
          </div>
        </a>`;
      }).join('');
    } catch (e) {
      document.getElementById('userPosts').innerHTML = '<p style="color:var(--text-3);padding:20px 0;">加载失败</p>';
    }
  }

  async function loadUserOCs(email) {
    try {
      const allOCs = await getAllOCs();
      const userOCs = allOCs.filter(o => o.creatorId === email)
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      const container = document.getElementById('userOCs');

      if (userOCs.length === 0) {
        container.innerHTML = '<div class="empty-state"><div style="font-size:36px;margin-bottom:12px;">🧑‍🎨</div><p>还没有创建 OC</p></div>';
        return;
      }

      container.innerHTML = '<div class="oc-grid">' + userOCs.map(oc => `
        <a class="oc-card" href="oc-detail.html?id=${oc.id}">
          <div class="oc-card-top"></div>
          <div class="oc-card-body">
            <div class="oc-avatar">${oc.avatar ? `<img src="${oc.avatar}" alt="${oc.name}">` : oc.gameId}</div>
            <div class="oc-info">
              <h3>${oc.name}</h3>
              <div class="game-id">${oc.gameId}</div>
              <div class="meta">
                <span class="tag tag-class">${oc.class}</span>
                <span class="tag tag-team">${oc.team}</span>
              </div>
            </div>
          </div>
        </a>
      `).join('') + '</div>';
    } catch (e) {
      document.getElementById('userOCs').innerHTML = '<p style="color:var(--text-3);padding:20px 0;">加载失败</p>';
    }
  }

  // Tab 切换
  document.querySelectorAll('.profile-tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.profile-tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    };
  });
</script>

<style>
  .profile-hero {
    background: linear-gradient(135deg, var(--blue-1) 0%, var(--green-2) 100%);
    color: var(--white);
    padding: 40px 24px 48px;
  }
  .profile-header {
    display: flex; align-items: center; gap: 24px;
    max-width: 1200px; margin: 0 auto;
  }
  .profile-avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 3px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; font-weight: 700;
    flex-shrink: 0;
    overflow: hidden;
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-info { flex: 1; }
  .profile-info h1 { font-size: 28px; font-weight: 700; }
  .profile-title {
    font-size: 14px; opacity: 0.85;
    margin-top: 4px;
    display: inline-block;
    padding: 2px 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
  }
  .profile-join { font-size: 13px; opacity: 0.7; margin-top: 8px; }

  .profile-body {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    padding: 24px 0 48px;
  }
  .profile-side { display: flex; flex-direction: column; gap: 20px; }
  .profile-main { min-width: 0; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-item {
    text-align: center;
    padding: 14px 8px;
    background: var(--bg);
    border-radius: 8px;
  }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--blue-3); line-height: 1.2; }
  .stat-label { font-size: 12px; color: var(--text-3); margin-top: 4px; }

  .profile-tabs {
    display: flex; gap: 4px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 20px;
  }
  .profile-tab {
    padding: 10px 20px;
    font-size: 14px; font-weight: 500;
    border: none; background: none;
    color: var(--text-3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    font-family: inherit;
  }
  .profile-tab:hover { color: var(--blue-3); }
  .profile-tab.active { color: var(--blue-3); border-bottom-color: var(--blue-3); font-weight: 600; }
  .profile-tab-content { display: none; }
  .profile-tab-content.active { display: block; }

  @media (max-width: 768px) {
    .profile-header { flex-direction: column; text-align: center; }
    .profile-body { grid-template-columns: 1fr; }
    .profile-side { order: 2; }
    .profile-main { order: 1; }
    .profile-tabs { overflow-x: auto; }
    .profile-tab { white-space: nowrap; padding: 10px 14px; font-size: 13px; }
  }
</style>
</body>
</html>
