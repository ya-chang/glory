<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>验证邮箱 - 荣耀社区</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0608; font-family:'Microsoft YaHei','PingFang SC',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; color:#f0d888; }
  .card { text-align:center; padding:40px; background:rgba(18,8,8,0.9); border:1px solid rgba(140,80,30,0.2); border-radius:8px; max-width:400px; }
  .spinner { width:40px; height:40px; border:3px solid rgba(140,80,30,0.2); border-top-color:#c8a030; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  h1 { font-size:20px; letter-spacing:4px; margin-bottom:12px; }
  p { color:rgba(200,160,80,0.5); font-size:13px; }
  .error { color:#c0392b; }
  a { display:inline-block; margin-top:20px; padding:12px 32px; background:linear-gradient(180deg,#d44020,#a02818); color:#1a0800; text-decoration:none; border-radius:4px; font-weight:700; letter-spacing:4px; }
</style>
</head>
<body>
  <div class="card" id="loading">
    <div class="spinner"></div>
    <h1>验证中...</h1>
    <p>请稍候</p>
  </div>
  <div class="card" id="success" style="display:none;">
    <h1 style="color:#34a853;">✓ 验证成功</h1>
    <p>你的邮箱已验证通过<br>现在可以登录荣耀社区了</p>
    <a href="index.html">前往登录</a>
  </div>
  <div class="card" id="fail" style="display:none;">
    <h1 class="error">验证失败</h1>
    <p id="fail-msg">链接已过期或无效</p>
    <a href="index.html">返回登录</a>
  </div>
<script>
  const API_BASE = 'https://glory-api-feqlkejziv.cn-hangzhou.fcapp.run';
  const token = new URLSearchParams(window.location.search).get('token');
  
  if (!token) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('fail').style.display = 'block';
    document.getElementById('fail-msg').textContent = '缺少验证参数';
  } else {
    fetch(`${API_BASE}/api/verify?token=${token}`)
      .then(r => {
        if (r.ok) {
          // 成功 - 后端返回了 HTML，直接替换
          return r.text().then(html => {
            document.open();
            document.write(html);
            document.close();
          });
        }
        return r.json().then(data => {
          throw new Error(data.error || '验证失败');
        });
      })
      .catch(err => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('fail').style.display = 'block';
        document.getElementById('fail-msg').textContent = err.message || '验证失败，请稍后重试';
      });
  }
</script>
</body>
</html>
