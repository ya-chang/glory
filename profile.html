<footer class="footer">

<script src="common.js?v=2"></script>
<script src="forum.js?v=2"></script>
<script src="oc.js?v=2"></script>
<script>
  // ===== 检查登录 =====
  if (!getToken()) {
    alert('请先登录');
    window.location.href = 'index.html';
  }

  // ===== 签到系统（本地） =====
  const CHECKIN_KEY = 'glory_checkin';

  function getCheckinData() {
    try {
      const data = localStorage.getItem(CHECKIN_KEY);
      return data ? JSON.parse(data) : { dates: [], streak: 0, lastDate: '' };
    } catch(e) { return { dates: [], streak: 0, lastDate: '' }; }
  }

  function getToday() {
    return new Date().toISOString().slice(0, 10);
  }

  function isTodayCheckedIn() {
    return getCheckinData().lastDate === getToday();
  }

  function calcStreak(dates) {
    if (dates.length === 0) return 0;
    const sorted = [...dates].sort().reverse();
    let streak = 1;
    const today = getToday();
    if (sorted[0] !== today) {
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      if (sorted[0] !== yesterday) return 0;
    }
    for (let i = 1; i < sorted.length; i++) {
      const prev = new Date(sorted[i - 1]);
      const curr = new Date(sorted[i]);
      if ((prev - curr) / 86400000 === 1) streak++;
      else break;
    }
    return streak;
  }

  function doCheckin() {
    if (isTodayCheckedIn()) return;
    const data = getCheckinData();
    const today = getToday();
    data.dates.push(today);
    data.lastDate = today;
    data.streak = calcStreak(data.dates);
    localStorage.setItem(CHECKIN_KEY, JSON.stringify(data));
    renderCheckin();
    showToast('签到成功！+10 EXP 🎉');
  }

  function renderCheckin() {
    const data = getCheckinData();
    const checked = isTodayCheckedIn();
    data.streak = calcStreak(data.dates);

    document.getElementById('checkinStreak').textContent = data.streak;
    document.getElementById('checkinTotal').textContent = data.dates.length;
    document.getElementById('checkinExpEarned').textContent = data.dates.length * 10;

    const btn = document.getElementById('checkinBtn');
    const status = document.getElementById('checkinStatus');
    if (checked) {
      btn.disabled = true;
      btn.textContent = '✅ 今日已签到';
      btn.classList.add('checked');
      status.innerHTML = '<span class="checkin-done">今日已签到 +10 EXP</span>';
    } else {
      btn.disabled = false;
      btn.textContent = '✅ 签到 +10 EXP';
      btn.classList.remove('checked');
      status.innerHTML = '<span class="checkin-pending">今日还未签到</span>';
    }

    const cal = document.getElementById('checkinCalendar');
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(Date.now() - i * 86400000);
      const dateStr = d.toISOString().slice(0, 10);
      const dayLabel = ['日','一','二','三','四','五','六'][d.getDay()];
      const done = data.dates.includes(dateStr);
      const isToday = dateStr === getToday();
      days.push(`
        <div class="cal-day ${done ? 'done' : ''} ${isToday ? 'today' : ''}">
          <div class="cal-day-label">${dayLabel}</div>
          <div class="cal-day-dot">${done ? '✓' : d.getDate()}</div>
        </div>
      `);
    }
    cal.innerHTML = '<div class="cal-row">' + days.join('') + '</div>';
  }

  // ===== 等级系统 =====
  const LEVELS = [
    { level: 1, name: '新手玩家', exp: 0 },
    { level: 2, name: '网吧常客', exp: 100 },
    { level: 3, name: '业余选手', exp: 300 },
    { level: 4, name: '职业新人', exp: 600 },
    { level: 5, name: '职业选手', exp: 1000 },
    { level: 6, name: '明星选手', exp: 2000 },
    { level: 7, name: '战队队长', exp: 3500 },
    { level: 8, name: '联盟传奇', exp: 5000 },
    { level: 9, name: '荣耀教科书', exp: 8000 },
    { level: 10, name: '荣耀之神', exp: 12000 }
  ];

  const BADGES = [
    { id: 'newcomer', name: '初来乍到', icon: '🌟', desc: '注册账号', condition: () => true },
    { id: 'first_post', name: '初次发声', icon: '📝', desc: '发布第一篇帖子', condition: (s) => s.posts >= 1 },
    { id: 'first_oc', name: '造物主', icon: '🧑‍🎨', desc: '创建第一个 OC', condition: (s) => s.ocs >= 1 },
    { id: 'social', name: '社交蝴蝶', icon: '🦋', desc: '回复 10+ 帖子', condition: (s) => s.replies >= 10 },
    { id: 'liked', name: '人气之星', icon: '⭐', desc: '累计获得 10 赞', condition: (s) => s.likes >= 10 },
    { id: 'creator', name: '创作达人', icon: '🎨', desc: '发布 5+ 帖子', condition: (s) => s.posts >= 5 },
    { id: 'oc_master', name: 'OC 大师', icon: '🏆', desc: '创建 3+ OC', condition: (s) => s.ocs >= 3 },
    { id: 'veteran', name: '社区老兵', icon: '🏛️', desc: '达到 Lv.5', condition: (s) => s.level >= 5 },
  ];

  function calcLevel(exp) {
    let current = LEVELS[0];
    let next = LEVELS[1];
    for (let i = LEVELS.length - 1; i >= 0; i--) {
      if (exp >= LEVELS[i].exp) {
        current = LEVELS[i];
        next = LEVELS[i + 1] || LEVELS[i];
        break;
      }
    }
    const progress = next.exp > current.exp
      ? ((exp - current.exp) / (next.exp - current.exp)) * 100
      : 100;
    return { current, next, progress: Math.min(progress, 100) };
  }

  // ===== 主渲染 =====
  let profileData = null;

  async function renderProfile() {
    try {
      profileData = await apiGet('/api/profile');
      if (!profileData) return;

      const stats = profileData.stats || { posts: 0, replies: 0, likes: 0, ocs: 0 };
      const exp = profileData.exp || 0;
      const levelInfo = calcLevel(exp);

      // 头像
      const avatarEl = document.getElementById('profileAvatar');
      if (profileData.avatar) {
        avatarEl.innerHTML = `<img src="${profileData.avatar}" alt="${profileData.username}" loading="lazy">`;
      } else {
        avatarEl.textContent = (profileData.username || '荣')[0];
      }

      // 基本信息
      document.getElementById('profileName').textContent = profileData.username || '荣耀玩家';
      if (isAdmin()) {
        document.getElementById('profileName').textContent = profileData.username || '管理员';
        document.getElementById('profileName').innerHTML = (profileData.username || '管理员') + ' <span style="background:#6a1b9a;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle;">管理员</span>';
      }
      document.getElementById('profileTitle').textContent = levelInfo.current.name;
      document.getElementById('profileJoinDate').textContent = profileData.joinDate || '2026-05-01';

      // 等级
      document.getElementById('levelBadge').textContent = `Lv.${levelInfo.current.level}`;
      document.getElementById('levelName').textContent = levelInfo.current.name;
      document.getElementById('levelProgressFill').style.width = levelInfo.progress + '%';
      document.getElementById('currentExp').textContent = exp;
      document.getElementById('nextLevelExp').textContent = levelInfo.next.exp;

      // 统计
      document.getElementById('statPosts').textContent = stats.posts;
      document.getElementById('statReplies').textContent = stats.replies;
      document.getElementById('statLikes').textContent = stats.likes;
      document.getElementById('statOCs').textContent = stats.ocs;

      // 徽章
      document.getElementById('badgesGrid').innerHTML = BADGES.map(b => {
        const unlocked = b.condition(stats);
        return `<div class="badge-item ${unlocked ? 'unlocked' : 'locked'}" title="${b.desc}">
          <div class="badge-icon">${b.icon}</div>
          <div class="badge-name">${b.name}</div>
        </div>`;
      }).join('');

      // 等级表
      document.getElementById('levelTable').innerHTML = LEVELS.map(l => `
        <div class="level-row ${l.level <= levelInfo.current.level ? 'reached' : ''}">
          <span class="level-row-badge">Lv.${l.level}</span>
          <span class="level-row-name">${l.name}</span>
          <span class="level-row-exp">${l.exp} EXP</span>
        </div>
      `).join('');

      // 我的帖子
      renderMyPosts();
      // 我的 OC
      renderMyOCs();
      // 签到
      renderCheckin();

      // 管理员显示公告按钮
      if (isAdmin()) {
        var btn = document.getElementById('adminAnnounceBtn');
        if (btn) btn.style.display = 'inline-block';
      }
    } catch (e) {
      console.error('renderProfile error:', e);
    }
  }

  async function renderMyPosts() {
    try {
      const user = getUser();
      if (!user) return;
      const result = await getPostsByAuthor(user.email);
      const myPosts = result.items || [];
      const container = document.getElementById('myPosts');

      if (myPosts.length === 0) {
        container.innerHTML = `<div class="empty-state">
          <div style="font-size:36px;margin-bottom:12px;">📝</div>
          <p>还没有发过帖子</p>
          <a href="post-new.html" class="btn btn-primary" style="margin-top:12px;">去发一帖</a>
        </div>`;
        return;
      }

      container.innerHTML = myPosts.map(post => {
        const cat = getCategoryById(post.category);
        return `<a class="post-item" href="post-detail.html?id=${post.id}">
          <div class="post-body">
            <div class="post-title">${escapeForumHtml(post.title)}</div>
            <div class="post-meta">
              <span>${cat ? cat.icon : '📁'} ${cat ? cat.name : '未知'}</span>
              <span class="stat">💬 ${post.replyCount}</span>
              <span class="stat">👍 ${post.likeCount}</span>
              <span class="stat">👁️ ${post.viewCount}</span>
              <span>${forumTimeAgo(post.createdAt)}</span>
            </div>
          </div>
        </a>`;
      }).join('');
    } catch (e) {
      document.getElementById('myPosts').innerHTML = '<p style="color:var(--text-3);padding:20px 0;">加载失败</p>';
    }
  }

  async function renderMyOCs() {
    try {
      const allOCs = await getAllOCs();
      const user = getUser();
      const myOCs = allOCs.filter(o => user && o.creatorId === user.email)
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      const container = document.getElementById('myOCs');

      if (myOCs.length === 0) {
        container.innerHTML = `<div class="empty-state">
          <div style="font-size:36px;margin-bottom:12px;">🧑‍🎨</div>
          <p>还没有创建 OC</p>
          <a href="oc-create.html" class="btn btn-primary" style="margin-top:12px;">创建 OC</a>
        </div>`;
        return;
      }

      container.innerHTML = '<div class="oc-grid">' + myOCs.map(oc => `
        <a class="oc-card" href="oc-detail.html?id=${oc.id}">
          <div class="oc-card-top"></div>
          <div class="oc-card-body">
            <div class="oc-avatar">${oc.avatar ? `<img src="${oc.avatar}" alt="${oc.name}" loading="lazy">` : oc.gameId}</div>
            <div class="oc-info">
              <h3>${oc.name}</h3>
              <div class="game-id">${oc.gameId}</div>
              <div class="meta">
                <span class="tag tag-class">${oc.class}</span>
                <span class="tag tag-team">${oc.team}</span>
              </div>
            </div>
          </div>
        </a>
      `).join('') + '</div>';
    } catch (e) {
      document.getElementById('myOCs').innerHTML = '<p style="color:var(--text-3);padding:20px 0;">加载失败</p>';
    }
  }

  // Tab 切换
  document.querySelectorAll('.profile-tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.profile-tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    };
  });

  renderProfile();
</script>
