<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>重置密码 - 荣耀社区</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
<link rel="stylesheet" href="auth.css">
</head>
<body>
<div class="bg"></div>
<div class="toast" id="toast"></div>
<div class="scene">
  <div class="wrapper">
    <div class="card">
      <h1>重置密码</h1>
      <div id="form-area">
        <div class="field">
          <label>新密码</label>
          <input type="password" id="new-pwd" placeholder="至少6位" autocomplete="new-password">
        </div>
        <div class="field">
          <label>确认新密码</label>
          <input type="password" id="new-pwd2" placeholder="再次输入新密码" autocomplete="new-password">
        </div>
        <button class="btn" id="btn-reset" onclick="doReset()">重置密码</button>
      </div>
      <div class="result" id="success-area">
        <h2 style="color:#34a853;">✓ 重置成功</h2>
        <p>密码已更新<br>请使用新密码登录</p>
        <a href="index.html">前往登录</a>
      </div>
      <div class="result" id="fail-area">
        <h2 style="color:#c0392b;">重置失败</h2>
        <p id="fail-msg">链接已过期或无效</p>
        <a href="index.html">返回登录</a>
      </div>
    </div>
  </div>
</div>
<script src="auth.js"></script>
<script>
  const token = new URLSearchParams(window.location.search).get('token');

  async function doReset() {
    const pwd = document.getElementById('new-pwd').value;
    const pwd2 = document.getElementById('new-pwd2').value;
    if (!pwd || pwd.length < 6) { showToast('密码至少6位','error'); return; }
    if (pwd !== pwd2) { showToast('两次密码不一致','error'); return; }
    const btn = document.getElementById('btn-reset');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>重置中...';
    try {
      const r = await fetch(`${API_BASE}/api/reset-password/confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: pwd })
      });
      const data = await r.json();
      if (r.ok) {
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success-area').classList.add('show');
      } else {
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('fail-area').classList.add('show');
        document.getElementById('fail-msg').textContent = data.error || '重置失败';
      }
    } catch (err) {
      showToast('网络错误，请重试','error');
      btn.disabled = false;
      btn.textContent = '重置密码';
    }
  }

  document.getElementById('new-pwd2').addEventListener('keydown', e => { if (e.key==='Enter') doReset(); });

  if (!token) {
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('fail-area').classList.add('show');
    document.getElementById('fail-msg').textContent = '缺少重置参数';
  }
</script>
</body>
</html>
