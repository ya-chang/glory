<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通知中心 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="community.html" class="topbar-brand"><img src="favicon.png" alt="荣耀" class="brand-icon"> 荣耀社区</a>
    <button class="menu-toggle" onclick="document.querySelector('.topbar-nav').classList.toggle('open')">☰</button>
    <nav class="topbar-nav">
      <a href="community.html">首页</a>
      <a href="players.html">选手百科</a>
      <a href="teams.html">战队阵容</a>
      <a href="forum-home.html">讨论区</a>
      <a href="oc-home.html">OC中心</a>
    </nav>
    <div class="topbar-right">
      <a href="search.html" class="nav-text-btn">搜索</a>
      <a href="notifications.html" class="nav-text-btn">通知</a>
      <a href="profile.html" class="nav-text-btn">我的</a>
      <a href="index.html" class="btn-logout">退出</a>
    </div>
  </div>
</header>

<div class="page-header">
  <div class="container">
    <h1>🔔 通知中心</h1>
    <p>查看你的消息和提醒</p>
  </div>
</div>

<div class="container" style="max-width:760px;padding-top:24px;padding-bottom:48px;">

  <!-- 筛选栏 -->
  <div class="notify-filter-bar">
    <div class="notify-filter-tabs">
      <button class="notify-filter-tab active" data-filter="all">全部</button>
      <button class="notify-filter-tab" data-filter="unread">未读</button>
      <button class="notify-filter-tab" data-filter="reply">💬 回复</button>
      <button class="notify-filter-tab" data-filter="like">👍 点赞</button>
      <button class="notify-filter-tab" data-filter="mention">@ 提及</button>
      <button class="notify-filter-tab" data-filter="system">📢 系统</button>
    </div>
    <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px;" onclick="markAllRead()">全部已读</button>
  </div>

  <!-- 加载状态 -->
  <div id="loadingState" style="text-align:center;padding:40px 0;color:var(--text-3);">加载中...</div>

  <!-- 通知列表 -->
  <div id="notifyList"></div>

  <!-- 空状态 -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <div style="font-size:48px;margin-bottom:16px;">🔔</div>
    <p>暂无通知</p>
    <a href="forum-home.html" class="btn btn-primary" style="margin-top:12px;">去逛逛讨论区</a>
  </div>

</div>

<footer class="footer">
  <p>🏆 荣耀社区 · 全职高手同人站</p>
</footer>

<script src="common.js?v=2"></script>
<script src="forum.js?v=2"></script>
<script>
  if (!getToken()) { alert('请先登录'); window.location.href = 'index.html'; }

  var NOTIFY_TYPES = {
    reply: { icon: '💬', label: '回复了你的帖子' },
    like_post: { icon: '👍', label: '赞了你的帖子' },
    like_reply: { icon: '👍', label: '赞了你的回复' },
    mention: { icon: '📢', label: '在回复中提到了你' },
    system: { icon: '🔔', label: '系统通知' }
  };

  var allNotifications = [];
  var currentFilter = 'all';

  async function loadNotifications() {
    try {
      allNotifications = await apiGet('/api/notifications');
      if (!allNotifications) return;
      document.getElementById('loadingState').style.display = 'none';
      renderNotifications();
    } catch(e) {
      console.error('loadNotifications error:', e);
      document.getElementById('loadingState').textContent = '加载失败，请刷新重试';
    }
  }

  function renderNotifications() {
    var filtered = allNotifications;
    if (currentFilter === 'unread') filtered = allNotifications.filter(function(n) { return !n.read; });
    else if (currentFilter !== 'all') filtered = allNotifications.filter(function(n) { return n.type && n.type.startsWith(currentFilter); });

    var container = document.getElementById('notifyList');
    var empty = document.getElementById('emptyState');

    if (filtered.length === 0) { container.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    container.innerHTML = filtered.map(function(n) {
      var typeInfo = NOTIFY_TYPES[n.type] || NOTIFY_TYPES.system;
      var link = n.postId ? 'post-detail.html?id=' + n.postId : '#';
      return '<a class="notify-item ' + (n.read ? '' : 'unread') + '" href="' + link + '" onclick="markRead(\'' + n.id + '\')">' +
        '<div class="notify-icon">' + typeInfo.icon + '</div>' +
        '<div class="notify-body">' +
          '<div class="notify-header"><span class="notify-from">' + escapeForumHtml(n.from || '系统') + '</span><span class="notify-action">' + typeInfo.label + '</span></div>' +
          (n.postTitle ? '<div class="notify-post-title">' + escapeForumHtml(n.postTitle) + '</div>' : '') +
          (n.content ? '<div class="notify-content">' + escapeForumHtml(n.content) + '</div>' : '') +
          '<div class="notify-time">' + forumTimeAgo(n.time) + '</div>' +
        '</div>' +
        (!n.read ? '<div class="notify-dot"></div>' : '') +
      '</a>';
    }).join('');
  }

  async function markRead(id) {
    try { await apiPut('/api/notifications/' + id + '/read'); var n = allNotifications.find(function(x) { return x.id === id; }); if (n) n.read = true; } catch(e) {}
  }

  async function markAllRead() {
    try { await apiPut('/api/notifications/read-all'); allNotifications.forEach(function(n) { n.read = true; }); renderNotifications(); } catch(e) { alert('操作失败'); }
  }

  document.querySelectorAll('.notify-filter-tab').forEach(function(tab) {
    tab.onclick = function() {
      document.querySelectorAll('.notify-filter-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderNotifications();
    };
  });

  loadNotifications();
</script>

<style>
  .notify-filter-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap; gap: 12px;
  }
  .notify-filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .notify-filter-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px; font-weight: 500;
    color: var(--text-3);
    cursor: pointer;
    background: none; border: none;
    font-family: inherit;
  }
  .notify-filter-tab:hover { color: var(--blue-3); background: var(--blue-5); }
  .notify-filter-tab.active { background: var(--blue-3); color: var(--white); }

  .notify-item {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 16px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    text-decoration: none;
    color: inherit;
    position: relative;
  }
  .notify-item:hover { border-color: var(--blue-4); box-shadow: var(--shadow); }
  .notify-item.unread { background: var(--blue-5); border-color: var(--blue-4); }
  .notify-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .notify-item.unread .notify-icon { border-color: var(--blue-4); }
  .notify-body { flex: 1; min-width: 0; }
  .notify-header { font-size: 14px; margin-bottom: 4px; }
  .notify-from { font-weight: 600; color: var(--text); }
  .notify-action { color: var(--text-3); margin-left: 4px; }
  .notify-post-title { font-size: 13px; font-weight: 500; color: var(--blue-3); margin-bottom: 4px; }
  .notify-content {
    font-size: 13px; color: var(--text-2); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .notify-time { font-size: 12px; color: var(--text-3); margin-top: 6px; }
  .notify-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--blue-3);
    flex-shrink: 0;
    margin-top: 6px;
    box-shadow: 0 0 6px rgba(26,115,232,0.4);
  }
</style>
</body>
</html>
