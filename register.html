<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>荣耀 · 注册</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="bg"></div>
<div class="embers" id="embers"></div>
<div class="noise"></div>
<div class="scanlines"></div>

<div class="toast" id="toast"></div>

<div class="scene">
  <div class="register-wrapper">

    <div class="emblem-wrap">
      <div class="emblem-glow"></div>
      <img class="emblem-img" src="https://iili.io/Bb45QLl.png" alt="荣耀 Glory" draggable="false">
    </div>

    <div class="divider"></div>

    <div class="register-card">
      <div class="card-title">账号注册</div>

      <!-- Step indicator -->
      <div class="steps">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-line" id="line1"></div>
        <div class="step-dot" id="dot2">2</div>
      </div>
      <div class="step-labels">
        <span class="step-label active" id="label1">填写信息</span>
        <span class="step-label" id="label2">验证邮箱</span>
      </div>

      <!-- Step 1: Fill in info -->
      <div class="step-panel active" id="step1">
        <div class="form">
          <div class="field">
            <label>用户名 <span class="required">*</span></label>
            <input type="text" id="reg-username" placeholder="2-20个字符" autocomplete="off" spellcheck="false" maxlength="20">
            <div class="field-hint" id="hint-username"></div>
          </div>
          <div class="field">
            <label>邮箱 <span class="required">*</span></label>
            <input type="email" id="reg-email" placeholder="用于登录和找回密码" autocomplete="off" spellcheck="false">
            <div class="field-hint" id="hint-email"></div>
          </div>
          <div class="field">
            <label>密码 <span class="required">*</span></label>
            <input type="password" id="reg-pwd" placeholder="至少6位" autocomplete="new-password">
            <div class="pwd-strength" id="pwd-strength">
              <div class="pwd-bar" id="bar1"></div>
              <div class="pwd-bar" id="bar2"></div>
              <div class="pwd-bar" id="bar3"></div>
              <div class="pwd-bar" id="bar4"></div>
            </div>
            <div class="pwd-label" id="pwd-label"></div>
          </div>
          <div class="field">
            <label>确认密码 <span class="required">*</span></label>
            <input type="password" id="reg-pwd2" placeholder="再次输入密码" autocomplete="new-password">
            <div class="field-hint" id="hint-pwd2"></div>
          </div>
          <div class="btn-row" style="flex-direction: column;">
            <button class="btn-register" id="btn-step1" onclick="doRegister()">注 册</button>
          </div>
        </div>
      </div>

      <!-- Step 2: Verify email -->
      <div class="step-panel" id="step2">
        <div class="success-panel active">
          <div class="success-icon" style="border-color: rgba(200, 160, 80, 0.3); background: rgba(200, 160, 80, 0.08); color: #f0d888;">✉</div>
          <div class="success-title">验证你的邮箱</div>
          <div class="success-desc">
            我们已向 <span class="email-highlight" id="email-display"></span> 发送了一封验证邮件<br>
            请打开邮件并点击验证链接完成注册<br><br>
            <span style="font-size: 11px; opacity: 0.6;">没收到？检查垃圾邮件文件夹</span>
          </div>
          <div class="resend-area">
            <button class="resend-link" id="btn-resend" onclick="resendVerification()">重新发送验证邮件</button>
          </div>
          <button class="btn-login-redirect" onclick="window.location.href='index.html'">前往登录</button>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="links">
        <a href="community.html">社区首页</a>
        <a href="index.html">返回登录</a>
      </div>
    </div>

  </div>
</div>

<script src="auth.js"></script>
<script>
  /* ===== Emblem glow ===== */
  const glow = document.querySelector('.emblem-glow');
  document.addEventListener('mousemove', (ev) => {
    if (!glow) return;
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const dx = (ev.clientX - cx) / cx;
    const dy = (ev.clientY - cy) / cy;
    glow.style.transform = `translate(calc(-50% + ${dx * 20}px), calc(-50% + ${dy * 15}px))`;
  });

  /* ===== Step navigation ===== */
  function setStep(n) {
    [1,2].forEach(i => {
      document.getElementById('step' + i).classList.toggle('active', i === n);
      document.getElementById('dot' + i).classList.toggle('active', i === n);
      document.getElementById('dot' + i).classList.toggle('done', i < n);
      document.getElementById('label' + i).classList.toggle('active', i === n);
    });
    document.getElementById('line1').classList.toggle('active', n > 1);
  }

  /* ===== Validation ===== */
  function validateForm() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pwd = document.getElementById('reg-pwd').value;
    const pwd2 = document.getElementById('reg-pwd2').value;

    if (!username || username.length < 2) {
      showFieldHint('hint-username', '用户名至少2个字符', 'error');
      return false;
    }
    showFieldHint('hint-username', '', '');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showFieldHint('hint-email', '请输入正确的邮箱', 'error');
      return false;
    }
    showFieldHint('hint-email', '', '');

    if (!pwd || pwd.length < 6) {
      showToast('密码至少6位', 'error');
      return false;
    }

    if (pwd !== pwd2) {
      showFieldHint('hint-pwd2', '两次密码不一致', 'error');
      return false;
    }
    showFieldHint('hint-pwd2', '', '');

    return true;
  }

  function showFieldHint(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'field-hint ' + (type || '');
  }

  /* ===== Password strength ===== */
  document.getElementById('reg-pwd').addEventListener('input', function() {
    const pwd = this.value;
    let score = 0;
    if (pwd.length >= 6) score++;
    if (pwd.length >= 10) score++;
    if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd) && /[^a-zA-Z0-9]/.test(pwd)) score++;

    for (let i = 1; i <= 4; i++) {
      document.getElementById('bar' + i).className = 'pwd-bar' + (i <= score ? ' s' + score : '');
    }
    const labels = ['', '弱', '一般', '较强', '强'];
    const colors = ['', 'var(--red-bright)', '#e67e22', 'var(--gold-mid)', 'var(--green-ok)'];
    document.getElementById('pwd-label').textContent = pwd ? '密码强度：' + labels[score] : '';
    document.getElementById('pwd-label').style.color = colors[score] || 'rgba(200,160,80,0.3)';
  });

  /* ===== Register ===== */
  let registeredEmail = '';

  // 带重试的 fetch 请求
  async function fetchWithRetry(url, options, retries = 2, delay = 2000) {
    for (let i = 0; i <= retries; i++) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000); // 15秒超时
        const response = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timeoutId);
        return response;
      } catch (err) {
        if (err.name === 'AbortError') {
          if (i < retries) {
            showToast(`请求超时，正在重试 (${i + 1}/${retries})...`, 'error');
            await new Promise(r => setTimeout(r, delay));
            continue;
          }
          throw new Error('请求超时，服务器响应较慢，请稍后再试');
        }
        if (i < retries) {
          showToast(`网络不稳定，正在重试 (${i + 1}/${retries})...`, 'error');
          await new Promise(r => setTimeout(r, delay));
          continue;
        }
        throw err;
      }
    }
  }

  async function doRegister() {
    if (!validateForm()) return;

    const btn = document.getElementById('btn-step1');
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pwd = document.getElementById('reg-pwd').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>注册中...';

    try {
      const r = await fetchWithRetry(`${API_BASE}/api/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, username, password: pwd })
      });
      const data = await r.json();

      if (r.ok) {
        // 注册成功 → 保存登录状态并跳转
        localStorage.setItem('glory_token', data.token);
        localStorage.setItem('glory_user', JSON.stringify(data.user));
        showToast('注册成功', 'success');
        setTimeout(() => window.location.href = 'community.html', 800);

      } else if (data.code === 'EMAIL_EXISTS') {
        // 邮箱已注册 → 引导去登录
        showToast('该邮箱已被注册，请直接登录', 'error');
        setTimeout(() => window.location.href = 'index.html', 1500);

      } else {
        showToast(data.error || '注册失败', 'error');
      }

    } catch (err) {
      const msg = err.message || '网络错误，请检查网络后重试';
      showToast(msg, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '注 册';
    }
  }

  /* ===== Resend verification ===== */
  let resendCooldown = false;
  async function resendVerification() {
    if (resendCooldown) return;

    const btn = document.getElementById('btn-resend');
    const email = registeredEmail;
    const pwd = document.getElementById('reg-pwd').value;

    btn.disabled = true;
    btn.textContent = '发送中...';

    try {
      const r = await fetch(`${API_BASE}/api/resend-verification`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pwd })
      });
      const data = await r.json();

      if (r.ok) {
        showToast('验证邮件已重新发送', 'success');
        resendCooldown = true;
        let sec = 60;
        const timer = setInterval(() => {
          sec--;
          btn.textContent = sec + 's 后可重发';
          if (sec <= 0) {
            clearInterval(timer);
            resendCooldown = false;
            btn.disabled = false;
            btn.textContent = '重新发送验证邮件';
          }
        }, 1000);
      } else {
        showToast(data.error || '发送失败', 'error');
        btn.disabled = false;
        btn.textContent = '重新发送验证邮件';
      }

    } catch (err) {
      showToast('网络错误，请稍后重试', 'error');
      btn.disabled = false;
      btn.textContent = '重新发送验证邮件';
    }
  }

  /* ===== Input events ===== */
  document.getElementById('reg-username').addEventListener('blur', function() {
    const v = this.value.trim();
    if (v && v.length < 2) showFieldHint('hint-username', '用户名至少2个字符', 'error');
    else showFieldHint('hint-username', '', '');
  });

  document.getElementById('reg-email').addEventListener('blur', function() {
    const v = this.value.trim();
    if (v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) showFieldHint('hint-email', '邮箱格式不正确', 'error');
    else showFieldHint('hint-email', '', '');
  });

  document.getElementById('reg-pwd2').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doRegister();
  });
</script>
</body>
</html>
