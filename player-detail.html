<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选手档案 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="community.html" class="topbar-brand"><img src="favicon.png" alt="荣耀" class="brand-icon"> 荣耀社区</a>
    <button class="menu-toggle" onclick="document.querySelector('.topbar-nav').classList.toggle('open')">☰</button>
    <nav class="topbar-nav">
      <a href="community.html">首页</a>
      <a href="players.html" class="active">选手百科</a>
      <a href="teams.html">战队阵容</a>
      <a href="forum-home.html">讨论区</a>
      <a href="oc-home.html">OC中心</a>
    </nav>
    <div class="topbar-right">
      <a href="search.html" class="nav-text-btn">搜索</a>
      <a href="notifications.html" class="nav-text-btn">通知</a>
      <a href="profile.html" class="nav-text-btn">我的</a>
      <a href="index.html" class="btn-logout">退出</a>
    </div>
  </div>
</header>

<div class="detail-hero" id="detailHero">
  <div class="container">
    <a href="players.html" class="back">← 返回选手列表</a>
    <div class="detail-header">
      <div class="detail-avatar" id="detailAvatar"></div>
      <div class="detail-meta">
        <h1 id="detailName"></h1>
        <div class="sub" id="detailSub"></div>
        <div class="tags" id="detailTags"></div>
      </div>
    </div>
  </div>
</div>

<div class="detail-body">
  <div class="detail-main">
    <div class="info-card">
      <h2>📖 角色简介</h2>
      <div class="bio-text" id="detailBio"></div>
    </div>
    <div class="info-card">
      <h2>📅 赛季经历</h2>
      <div class="career-timeline" id="detailCareer"></div>
    </div>
    <div class="info-card" id="honorsCard" style="display:none;">
      <h2>🏆 荣誉</h2>
      <div id="detailHonors"></div>
    </div>
  </div>
  <div class="detail-side">
    <div class="info-card">
      <h2>📋 基本信息</h2>
      <div id="detailInfo"></div>
    </div>
    <div class="info-card" id="relationsCard" style="display:none;">
      <h2>👥 人际关系</h2>
      <div id="detailRelations"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>🏆 荣耀社区 · 全职高手同人站</p>
</footer>

<script src="common.js?v=2"></script>
<script src="players.js?v=2"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const playerId = params.get('id');
  const player = PLAYERS.find(p => p.id === playerId);

  if (!player) {
    document.getElementById('detailHero').innerHTML = `
      <div class="container" style="text-align:center;padding:60px 0;">
        <div style="font-size:64px;margin-bottom:16px;">😢</div>
        <h2 style="color:var(--white);">未找到该选手</h2>
        <a href="players.html" style="color:rgba(255,255,255,0.7);margin-top:12px;display:inline-block;">← 返回选手列表</a>
      </div>`;
    document.querySelector('.detail-body').style.display = 'none';
  } else {
    document.title = `${player.name} · 选手档案 · 荣耀社区`;
    document.getElementById('detailAvatar').textContent = player.avatar;
    document.getElementById('detailName').textContent = player.name;
    document.getElementById('detailSub').textContent = `${player.gameId} · ${player.team.split('→').pop()}`;
    document.getElementById('detailTags').innerHTML = `
      <span class="tag">${player.class.split('/')[0]}</span>
      <span class="tag">${player.role}</span>
      <span class="tag">${player.status}</span>`;
    document.getElementById('detailBio').textContent = player.bio;

    const infoRows = [['游戏ID',player.gameId],['职业',player.class],['武器',player.weapon],['战队',player.team],['职位',player.role],['出道赛季',`S${player.debutSeason}`],['生日',player.birthday],['身高',player.height],['血型',player.blood]];
    document.getElementById('detailInfo').innerHTML = infoRows.map(([l,v])=>`<div class="info-row"><span class="label">${l}</span><span class="value">${v}</span></div>`).join('');

    document.getElementById('detailCareer').innerHTML = player.career.map(c=>`<div class="career-item${c.h?' highlight':''}"><div class="season">${c.s}</div><div class="detail">${c.d}</div></div>`).join('');

    if (player.honors.length) {
      document.getElementById('honorsCard').style.display = 'block';
      document.getElementById('detailHonors').innerHTML = player.honors.map(h=>`<span class="honor-badge">🏅 ${h}</span>`).join('');
    }

    if (player.relationships.length) {
      document.getElementById('relationsCard').style.display = 'block';
      document.getElementById('detailRelations').innerHTML = player.relationships.map(r => {
        const rel = PLAYERS.find(p => p.name === r.name);
        const av = rel ? rel.avatar : r.name[0];
        const href = rel ? `player-detail.html?id=${rel.id}` : '#';
        return `<a class="relation-item" href="${href}"><div class="relation-avatar">${av}</div><div class="relation-info"><div class="name">${r.name}</div><div class="desc">${r.desc}</div></div></a>`;
      }).join('');
    }
  }
</script>
</body>
</html>
