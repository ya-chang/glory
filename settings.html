<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="community.html" class="topbar-brand"><img src="favicon.png" alt="荣耀" class="brand-icon"> 荣耀社区</a>
    <button class="menu-toggle" onclick="document.querySelector('.topbar-nav').classList.toggle('open')">☰</button>
    <nav class="topbar-nav">
      <a href="community.html">首页</a>
      <a href="players.html">选手百科</a>
      <a href="teams.html">战队阵容</a>
      <a href="forum-home.html">讨论区</a>
      <a href="oc-home.html">OC中心</a>
    </nav>
    <div class="topbar-right">
      <a href="search.html" class="nav-text-btn">搜索</a>
      <a href="notifications.html" class="nav-text-btn">通知</a>
      <a href="profile.html" class="nav-text-btn">我的</a>
      <a href="index.html" class="btn-logout">退出</a>
    </div>
  </div>
</header>

<div class="page-header">
  <div class="container">
    <h1>⚙️ 设置</h1>
    <p>管理你的账号和个人资料</p>
  </div>
</div>

<div class="container" style="max-width:720px;padding-top:24px;padding-bottom:48px;">

  <!-- 个人资料 -->
  <div class="settings-card">
    <h2>👤 个人资料</h2>
    <div class="form-group">
      <label>昵称</label>
      <input type="text" id="s_name" placeholder="你的昵称" maxlength="20">
      <div class="hint">2-20 个字符</div>
    </div>
    <div class="form-group">
      <label>头像</label>
      <div class="file-upload">
        <input type="file" id="s_avatar" accept="image/*" onchange="previewAvatar(this)">
        <label for="s_avatar">选择图片</label>
        <div class="file-preview" id="avatarPreview"><img></div>
        <span style="font-size:12px;color:var(--text-3);">支持 jpg/png，建议 200x200</span>
      </div>
    </div>
    <div class="form-group">
      <label>个人简介</label>
      <textarea id="s_bio" placeholder="介绍一下自己..." rows="3" maxlength="200"></textarea>
      <div class="hint">最多 200 字</div>
    </div>
    <div class="form-group">
      <label>最喜欢的角色</label>
      <select id="s_favPlayer">
        <option value="">选择角色（可选）</option>
      </select>
    </div>
    <div class="form-group">
      <label>最喜欢的支持战队</label>
      <select id="s_favTeam">
        <option value="">选择战队（可选）</option>
      </select>
    </div>
    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" onclick="saveProfile()">💾 保存修改</button>
    </div>
  </div>

  <!-- 账号安全 -->
  <div class="settings-card">
    <h2>🔒 账号安全</h2>
    <div class="form-group">
      <label>当前密码</label>
      <input type="password" id="s_currentPassword" placeholder="修改密码时需要输入当前密码">
    </div>
    <div class="form-group">
      <label>新密码</label>
      <input type="password" id="s_newPassword" placeholder="新密码（留空则不修改）">
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="s_confirmPassword" placeholder="再次输入新密码">
    </div>
    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" onclick="savePassword()">🔒 修改密码</button>
    </div>
  </div>

  <!-- 返回 -->
  <div style="text-align:center;margin-top:20px;">
    <a href="profile.html" class="btn btn-secondary">← 返回个人主页</a>
  </div>

</div>

<footer class="footer">
  <p>🏆 荣耀社区 · 全职高手同人站</p>
</footer>

<script src="common.js?v=2"></script>
<script src="players.js?v=2"></script>
<script>
  // 检查登录
  if (!getToken()) { alert('请先登录'); window.location.href = 'index.html'; }

  // 初始化下拉
  var playerSelect = document.getElementById('s_favPlayer');
  PLAYERS.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p.name;
    opt.textContent = p.name + '（' + p.gameId.split('/')[0].trim() + '）';
    playerSelect.appendChild(opt);
  });

  var teamSelect = document.getElementById('s_favTeam');
  ['兴欣','嘉世','霸图','蓝雨','微草','轮回','雷霆','烟雨','虚空','呼啸','三零一','义斩'].forEach(function(t) {
    var opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    teamSelect.appendChild(opt);
  });

  var pendingAvatar = null;  // null=未修改, ''=已清除, 'url'=新上传
  var existingAvatar = '';

  // 立即从缓存填充所有字段，不等 API
  (function fillFromCache() {
    var cached = getUser();
    if (!cached) return;
    if (cached.username) document.getElementById('s_name').value = cached.username;
    if (cached.bio) document.getElementById('s_bio').value = cached.bio;
    if (cached.avatar) {
      existingAvatar = cached.avatar;
      document.querySelector('#avatarPreview img').src = cached.avatar;
      document.getElementById('avatarPreview').style.display = 'block';
    }
  })();

  // API 返回后用真实数据覆盖
  async function loadSettings() {
    try {
      var profile = await apiGet('/api/profile');
      if (!profile) return;
      // 更新 localStorage 缓存
      var cached = getUser() || {};
      cached.username = profile.username || cached.username;
      cached.bio = profile.bio || cached.bio;
      cached.avatar = profile.avatar || cached.avatar;
      localStorage.setItem('glory_user', JSON.stringify(cached));

      if (profile.username) document.getElementById('s_name').value = profile.username;
      if (profile.bio) document.getElementById('s_bio').value = profile.bio;
      if (profile.favPlayer) document.getElementById('s_favPlayer').value = profile.favPlayer;
      if (profile.favTeam) document.getElementById('s_favTeam').value = profile.favTeam;
      if (profile.avatar) {
        existingAvatar = profile.avatar;
        document.querySelector('#avatarPreview img').src = profile.avatar;
        document.getElementById('avatarPreview').style.display = 'block';
      }
    } catch(e) {
      console.error('loadSettings error:', e);
      // API 失败时缓存数据已经填过了，用户不会看到空白
    }
  }

  function previewAvatar(input) {
    var file = input.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { alert('请选择图片文件'); input.value = ''; return; }
    if (file.size > 10 * 1024 * 1024) { alert('图片过大，请选择 10MB 以内'); input.value = ''; return; }

    // 显示本地预览
    var reader = new FileReader();
    reader.onload = function(e) {
      document.querySelector('#avatarPreview img').src = e.target.result;
      document.getElementById('avatarPreview').style.display = 'block';
    };
    reader.readAsDataURL(file);

    // 压缩并上传到图床
    showToast('正在上传图片...', '');
    compressAndUpload(file, 200, 0.8).then(function(url) {
      pendingAvatar = url;
      document.querySelector('#avatarPreview img').src = url;
      showToast('图片上传成功', 'success');
    }).catch(function() {
      alert('图片上传失败，请重试');
      pendingAvatar = null;
    });
  }

  async function saveProfile() {
    var name = document.getElementById('s_name').value.trim();
    if (!name || name.length < 2) { alert('昵称至少 2 个字符'); return; }

    var avatarValue = pendingAvatar !== null ? pendingAvatar : existingAvatar;

    var data = {
      username: name,
      avatar: avatarValue,
      bio: document.getElementById('s_bio').value.trim(),
      favPlayer: document.getElementById('s_favPlayer').value,
      favTeam: document.getElementById('s_favTeam').value
    };

    try {
      var result = await apiPut('/api/profile', data);
      if (!result) return;
      var user = getUser() || {};
      user.username = name;
      localStorage.setItem('glory_user', JSON.stringify(user));
      showToast('个人资料已保存 ✅', 'success');
    } catch(e) {
      showToast('保存失败：' + (e.message || '网络错误'), 'error');
    }
  }

  async function savePassword() {
    var currentPwd = document.getElementById('s_currentPassword').value;
    var newPwd = document.getElementById('s_newPassword').value;
    var confirmPwd = document.getElementById('s_confirmPassword').value;

    if (!currentPwd) { alert('请输入当前密码'); return; }
    if (!newPwd) { alert('请输入新密码'); return; }
    if (newPwd !== confirmPwd) { alert('两次密码不一致'); return; }
    if (newPwd.length < 6) { alert('新密码至少 6 位'); return; }

    try {
      var result = await apiPut('/api/password', { currentPassword: currentPwd, newPassword: newPwd });
      if (!result) return;
      document.getElementById('s_currentPassword').value = '';
      document.getElementById('s_newPassword').value = '';
      document.getElementById('s_confirmPassword').value = '';
      showToast('密码修改成功 🔒', 'success');
    } catch(e) {
      showToast('修改失败：' + (e.message || '网络错误'), 'error');
    }
  }

  loadSettings();
</script>

<style>
  .settings-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .settings-card h2 {
    font-size: 17px; font-weight: 700;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .toast-msg {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.8); color: var(--white);
    padding: 10px 24px; border-radius: 8px;
    font-size: 14px; z-index: 1000; opacity: 0;
    transition: all 0.3s ease; pointer-events: none;
  }
  .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Mobile */
  @media (max-width: 768px) {
    .settings-card { padding: 18px 14px; }
    .settings-card h2 { font-size: 15px; margin-bottom: 14px; }
    .form-group label { font-size: 13px; }
    .form-group input, .form-group textarea, .form-group select {
      font-size: 15px; padding: 12px; width: 100%;
    }
    .form-group textarea { min-height: 80px; }
    .file-upload label { padding: 10px 20px; font-size: 13px; }
    .btn-row .btn { width: 100%; padding: 12px; font-size: 14px; }
    .file-preview img { max-width: 120px; max-height: 120px; }
  }
  @media (max-width: 480px) {
    .settings-card { padding: 14px 12px; }
    .file-preview { margin: 8px 0; }
  }
</style>
</body>
</html>
