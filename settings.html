<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="community.html" class="topbar-brand"><img src="favicon.png" alt="荣耀" class="brand-icon"> 荣耀社区</a>
    <button class="menu-toggle" onclick="document.querySelector('.topbar-nav').classList.toggle('open')">☰</button>
    <nav class="topbar-nav">
      <a href="community.html">首页</a>
      <a href="players.html">选手百科</a>
      <a href="teams.html">战队阵容</a>
      <a href="forum-home.html">讨论区</a>
      <a href="oc-home.html">OC中心</a>
    </nav>
    <div class="topbar-right">
      <a href="search.html" class="nav-text-btn">搜索</a>
      <a href="notifications.html" class="nav-text-btn">通知</a>
      <a href="profile.html" class="nav-text-btn">我的</a>
      <a href="index.html" class="btn-logout">退出</a>
    </div>
  </div>
</header>

<div class="page-header">
  <div class="container">
    <h1>⚙️ 设置</h1>
    <p>管理你的账号和个人资料</p>
  </div>
</div>

<div class="container" style="max-width:720px;padding-top:24px;padding-bottom:48px;">

  <!-- 个人资料 -->
  <div class="settings-card">
    <h2>👤 个人资料</h2>
    <div class="form-group">
      <label>昵称</label>
      <input type="text" id="s_name" placeholder="你的昵称" maxlength="20">
      <div class="hint">2-20 个字符</div>
    </div>
    <div class="form-group">
      <label>头像</label>
      <div class="file-upload">
        <input type="file" id="s_avatar" accept="image/*" onchange="previewAvatar(this)">
        <label for="s_avatar">选择图片</label>
        <div class="file-preview" id="avatarPreview"><img></div>
        <span style="font-size:12px;color:var(--text-3);">支持 jpg/png，建议 200x200</span>
      </div>
    </div>
    <div class="form-group">
      <label>个人简介</label>
      <textarea id="s_bio" placeholder="介绍一下自己..." rows="3" maxlength="200"></textarea>
      <div class="hint">最多 200 字</div>
    </div>
    <div class="form-group">
      <label>最喜欢的角色</label>
      <select id="s_favPlayer">
        <option value="">选择角色（可选）</option>
      </select>
    </div>
    <div class="form-group">
      <label>最喜欢的支持战队</label>
      <select id="s_favTeam">
        <option value="">选择战队（可选）</option>
      </select>
    </div>
    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" onclick="saveProfile()">💾 保存修改</button>
    </div>
  </div>

  <!-- 账号安全 -->
  <div class="settings-card">
    <h2>🔒 账号安全</h2>
    <div class="form-group">
      <label>当前密码</label>
      <input type="password" id="s_currentPassword" placeholder="修改密码时需要输入当前密码">
    </div>
    <div class="form-group">
      <label>新密码</label>
      <input type="password" id="s_newPassword" placeholder="新密码（留空则不修改）">
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="s_confirmPassword" placeholder="再次输入新密码">
    </div>
    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" onclick="savePassword()">🔒 修改密码</button>
    </div>
  </div>

  <!-- 返回 -->
  <div style="text-align:center;margin-top:20px;">
    <a href="profile.html" class="btn btn-secondary">← 返回个人主页</a>
  </div>

</div>

<footer class="footer">
  <p>🏆 荣耀社区 · 全职高手同人站</p>
</footer>

<script src="players.js"></script>
<script>
  const API_BASE = 'https://glory-api-feqlkejziv.cn-hangzhou.fcapp.run';

  // 检查登录
  const token = localStorage.getItem('glory_token');
  if (!token) {
    alert('请先登录');
    window.location.href = 'index.html';
  }

  // 初始化下拉
  const playerSelect = document.getElementById('s_favPlayer');
  PLAYERS.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.name;
    opt.textContent = `${p.name}（${p.gameId.split('/')[0].trim()}）`;
    playerSelect.appendChild(opt);
  });

  const teamSelect = document.getElementById('s_favTeam');
  ['兴欣','嘉世','霸图','蓝雨','微草','轮回','雷霆','烟雨','虚空','呼啸','三零一','义斩'].forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    teamSelect.appendChild(opt);
  });

  // 加载用户资料
  async function loadSettings() {
    try {
      const res = await fetch(`${API_BASE}/api/profile`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) {
        window.location.href = 'index.html';
        return;
      }
      if (!res.ok) return;
      const profile = await res.json();

      if (profile.username) document.getElementById('s_name').value = profile.username;
      if (profile.bio) document.getElementById('s_bio').value = profile.bio;
      if (profile.favPlayer) document.getElementById('s_favPlayer').value = profile.favPlayer;
      if (profile.favTeam) document.getElementById('s_favTeam').value = profile.favTeam;
      if (profile.avatar) {
        existingAvatar = profile.avatar;
        document.querySelector('#avatarPreview img').src = profile.avatar;
        document.getElementById('avatarPreview').style.display = 'block';
      }
    } catch (e) {
      console.error('loadSettings error:', e);
    }
  }

  // 追踪头像状态：null=未修改, ''=已清除, 'data:...'=新上传
  let pendingAvatar = null;
  // 记录已有的头像 URL（加载时从服务端获取）
  let existingAvatar = '';

  function previewAvatar(input) {
    const file = input.files[0];
    if (!file) return;
    // 验证文件类型
    if (!file.type.startsWith('image/')) {
      alert('请选择图片文件');
      input.value = '';
      return;
    }
    // 验证文件大小（2MB）
    if (file.size > 2 * 1024 * 1024) {
      alert('图片文件过大，请选择 2MB 以内的图片');
      input.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      pendingAvatar = e.target.result;
      document.querySelector('#avatarPreview img').src = pendingAvatar;
      document.getElementById('avatarPreview').style.display = 'block';
    };
    reader.onerror = function() {
      alert('图片读取失败，请重试');
    };
    reader.readAsDataURL(file);
  }

  async function saveProfile() {
    const name = document.getElementById('s_name').value.trim();
    if (!name || name.length < 2) { alert('昵称至少 2 个字符'); return; }

    // 决定头像值：
    // - pendingAvatar === null → 用户没改头像，保留已有的 existingAvatar
    // - pendingAvatar === ''   → 用户清除了头像
    // - pendingAvatar === 'data:...' → 用户上传了新头像
    let avatarValue;
    if (pendingAvatar !== null) {
      avatarValue = pendingAvatar; // 新上传或已清除
    } else {
      avatarValue = existingAvatar; // 未修改，保留原有
    }

    const data = {
      username: name,
      avatar: avatarValue,
      bio: document.getElementById('s_bio').value.trim(),
      favPlayer: document.getElementById('s_favPlayer').value,
      favTeam: document.getElementById('s_favTeam').value
    };

    try {
      const res = await fetch(`${API_BASE}/api/profile`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });
      if (res.status === 401) { window.location.href = 'index.html'; return; }
      if (!res.ok) {
        const err = await res.json();
        alert('保存失败：' + (err.error || '未知错误'));
        return;
      }
      // 更新本地缓存
      const user = JSON.parse(localStorage.getItem('glory_user') || '{}');
      user.username = name;
      localStorage.setItem('glory_user', JSON.stringify(user));
      showToast('个人资料已保存 ✅');
    } catch (e) {
      alert('网络错误，请稍后重试');
    }
  }

  async function savePassword() {
    const currentPwd = document.getElementById('s_currentPassword').value;
    const newPwd = document.getElementById('s_newPassword').value;
    const confirmPwd = document.getElementById('s_confirmPassword').value;

    if (!currentPwd) { alert('请输入当前密码'); return; }
    if (!newPwd) { alert('请输入新密码'); return; }
    if (newPwd !== confirmPwd) { alert('两次密码输入不一致'); return; }
    if (newPwd.length < 6) { alert('新密码至少 6 位'); return; }

    try {
      const res = await fetch(`${API_BASE}/api/password`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ currentPassword: currentPwd, newPassword: newPwd })
      });
      const data = await res.json();
      if (res.status === 401) { window.location.href = 'index.html'; return; }
      if (!res.ok) {
        alert('修改失败：' + (data.error || '未知错误'));
        return;
      }
      document.getElementById('s_currentPassword').value = '';
      document.getElementById('s_newPassword').value = '';
      document.getElementById('s_confirmPassword').value = '';
      showToast('密码修改成功 🔒');
    } catch (e) {
      alert('网络错误，请稍后重试');
    }
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2000);
  }

  loadSettings();
</script>

<style>
  .settings-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .settings-card h2 {
    font-size: 17px; font-weight: 700;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .toast-msg {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.8); color: var(--white);
    padding: 10px 24px; border-radius: 8px;
    font-size: 14px; z-index: 1000; opacity: 0;
    transition: all 0.3s ease; pointer-events: none;
  }
  .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</body>
</html>
