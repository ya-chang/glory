name: Deploy Backend to FC

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: backend
        run: npm install --omit=dev

      - name: Package
        working-directory: backend
        run: zip -r ../glory-api.zip . -x "node_modules/.cache/*"

      - name: Deploy to Alibaba Cloud FC
        uses: appleboy/lambda-function@v0.2.0
        with:
          access_key_id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access_key_secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          region: cn-hangzhou
          function_name: glory-api
          zip_file: glory-api.zip
          runtime: nodejs18
          handler: index.handler
          timeout: 30
          memory_size: 256
