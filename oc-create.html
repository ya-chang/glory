<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创建 OC · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="community.html" class="topbar-brand"><img src="favicon.png" alt="荣耀" class="brand-icon"> 荣耀社区</a>
    <button class="menu-toggle" onclick="document.querySelector('.topbar-nav').classList.toggle('open')">☰</button>
    <nav class="topbar-nav">
      <a href="community.html">首页</a>
      <a href="players.html">选手百科</a>
      <a href="teams.html">战队阵容</a>
      <a href="forum-home.html">讨论区</a>
      <a href="oc-home.html" class="active">OC中心</a>
    </nav>
    <div class="topbar-right">
      <a href="search.html" class="nav-text-btn">搜索</a>
      <a href="notifications.html" class="nav-text-btn">通知</a>
      <a href="profile.html" class="nav-text-btn">我的</a>
      <a href="index.html" class="btn-logout">退出</a>
    </div>
  </div>
</header>

<div class="page-header">
  <div class="container">
    <h1>创建 OC</h1>
    <p>设计你的原创角色</p>
  </div>
</div>

<div class="container" style="max-width:720px;padding-top:24px;padding-bottom:48px;">

  <!-- 步骤指示器 -->
  <div class="steps">
    <div class="step active" id="step1"><span class="step-num">1</span> 基本信息</div>
    <div class="step-line" id="line1"></div>
    <div class="step" id="step2"><span class="step-num">2</span> 荣耀设定</div>
    <div class="step-line" id="line2"></div>
    <div class="step" id="step3"><span class="step-num">3</span> 背景故事</div>
  </div>

  <!-- Step 1: 基本信息 -->
  <div class="form-card" id="form1">
    <h2>基本信息</h2>
    <div class="form-row">
      <div class="form-group">
        <label>角色名 <span class="req">*</span></label>
        <input type="text" id="f_name" placeholder="如：林默">
      </div>
      <div class="form-group">
        <label>游戏ID <span class="req">*</span></label>
        <input type="text" id="f_gameId" placeholder="如：暗影">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>年龄 <span class="req">*</span></label>
        <input type="number" id="f_age" placeholder="22" min="1" max="99">
      </div>
      <div class="form-group">
        <label>性别 <span class="req">*</span></label>
        <div class="form-radio-group">
          <label><input type="radio" name="gender" value="male"> 男</label>
          <label><input type="radio" name="gender" value="female"> 女</label>
          <label><input type="radio" name="gender" value="other"> 其他</label>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>身高</label>
        <input type="text" id="f_height" placeholder="如：176cm">
      </div>
      <div class="form-group">
        <label>生日</label>
        <input type="text" id="f_birthday" placeholder="如：11-07">
      </div>
    </div>
    <div class="form-group">
      <label>外貌描述</label>
      <textarea id="f_appearance" placeholder="发色、瞳色、体型、特征等" rows="3"></textarea>
      <div class="hint">可选，不想写可以留空</div>
    </div>
    <div class="form-group">
      <label>性格描述</label>
      <textarea id="f_personality" placeholder="3-5个关键词 + 简述" rows="3"></textarea>
      <div class="hint">可选，不想写可以留空</div>
    </div>
    <div class="form-group">
      <label>头像</label>
      <div class="file-upload">
        <input type="file" id="f_avatar" accept="image/*" onchange="previewFile(this, 'avatarPreview')">
        <label for="f_avatar">选择图片</label>
        <div class="file-preview" id="avatarPreview"><img></div>
        <span style="font-size:12px;color:var(--text-3);">不上传则显示游戏ID</span>
      </div>
    </div>
    <div class="form-group">
      <label>立绘</label>
      <div class="file-upload">
        <input type="file" id="f_illustration" accept="image/*" onchange="previewFile(this, 'illustPreview')">
        <label for="f_illustration">选择图片</label>
        <div class="file-preview" id="illustPreview"><img></div>
        <span style="font-size:12px;color:var(--text-3);">可选</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="saveDraft()">保存草稿</button>
      <button class="btn btn-primary" onclick="goStep(2)">下一步</button>
    </div>
  </div>

  <!-- Step 2: 荣耀设定 -->
  <div class="form-card" id="form2" style="display:none;">
    <h2>荣耀设定</h2>
    <div class="form-group">
      <label>职业 <span class="req">*</span></label>
      <select id="f_class">
        <option value="">选择职业</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>武器名称 <span class="req">*</span></label>
        <input type="text" id="f_weapon" placeholder="如：暗影之刃">
      </div>
      <div class="form-group">
        <label>武器类型 <span class="req">*</span></label>
        <select id="f_weaponType">
          <option value="银武">银武</option>
          <option value="橙武">橙武</option>
          <option value="紫武">紫武</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>武器描述 <span class="req">*</span></label>
      <input type="text" id="f_weaponDesc" placeholder="简要描述武器特点">
    </div>
    <div class="form-group">
      <label>战斗风格 <span class="req">*</span></label>
      <select id="f_combatStyle">
        <option value="">选择战斗风格</option>
      </select>
    </div>
    <div class="form-group">
      <label>标志技能 <span class="req">*</span></label>
      <div class="skill-inputs">
        <input type="text" class="skill-input" placeholder="技能 1">
        <input type="text" class="skill-input" placeholder="技能 2（可选）">
        <input type="text" class="skill-input" placeholder="技能 3（可选）">
      </div>
      <div class="hint">至少填写 1 个</div>
    </div>
    <div class="form-group">
      <label>自创技能</label>
      <input type="text" id="f_customSkill" placeholder="可选">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>所属战队 <span class="req">*</span></label>
        <select id="f_team">
          <option value="">选择战队</option>
        </select>
      </div>
      <div class="form-group">
        <label>职位 <span class="req">*</span></label>
        <select id="f_teamRole">
          <option value="">选择职位</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="saveDraft()">保存草稿</button>
      <button class="btn btn-primary" onclick="goStep(3)">下一步</button>
    </div>
  </div>

  <!-- Step 3: 背景故事 -->
  <div class="form-card" id="form3" style="display:none;">
    <h2>背景故事</h2>
    <div class="form-group">
      <label>背景故事</label>
      <textarea id="f_bio" placeholder="角色的过去、经历、动机..." rows="8"></textarea>
      <div class="hint">可选，不想写可以留空</div>
    </div>
    <div class="form-group">
      <label>人际关系</label>
      <div class="relation-inputs" id="relationInputs">
        <div class="relation-row">
          <div class="form-group" style="margin-bottom:0;">
            <input type="text" placeholder="角色名">
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <input type="text" placeholder="关系描述">
          </div>
          <button class="btn-remove" onclick="this.parentElement.remove()">删除</button>
        </div>
      </div>
      <button class="btn btn-secondary" style="margin-top:10px;font-size:13px;padding:6px 14px;" onclick="addRelation()">添加关系</button>
      <div class="hint">最多 10 条</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="saveDraft()">保存草稿</button>
      <button class="btn btn-primary" onclick="submitOC()">提交</button>
    </div>
  </div>

</div>

<footer class="footer">
  <p>荣耀社区 · 全职高手同人站</p>
</footer>

<script src="common.js?v=2"></script>
<script src="oc.js?v=2"></script>
<script>
  // 初始化下拉选项
  const classSelect = document.getElementById('f_class');
  OC_CLASSES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    classSelect.appendChild(opt);
  });

  const teamSelect = document.getElementById('f_team');
  OC_TEAMS.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    teamSelect.appendChild(opt);
  });

  const roleSelect = document.getElementById('f_teamRole');
  OC_ROLES.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    roleSelect.appendChild(opt);
  });

  const styleSelect = document.getElementById('f_combatStyle');
  OC_COMBAT_STYLES.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    styleSelect.appendChild(opt);
  });

  // 步骤切换
  let currentStep = 1;

  function goStep(n) {
    // 验证当前步骤
    if (n > currentStep && !validateStep(currentStep)) return;

    document.getElementById('form' + currentStep).style.display = 'none';
    document.getElementById('form' + n).style.display = 'block';

    // 更新步骤指示器
    for (let i = 1; i <= 3; i++) {
      const el = document.getElementById('step' + i);
      el.className = 'step';
      if (i < n) el.className = 'step done';
      if (i === n) el.className = 'step active';
    }
    for (let i = 1; i <= 2; i++) {
      const line = document.getElementById('line' + i);
      line.className = i < n ? 'step-line done' : 'step-line';
    }

    currentStep = n;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function validateStep(step) {
    if (step === 1) {
      const name = document.getElementById('f_name').value.trim();
      const gameId = document.getElementById('f_gameId').value.trim();
      const age = document.getElementById('f_age').value;
      const gender = document.querySelector('input[name="gender"]:checked');

      if (!name) { alert('请填写角色名'); return false; }
      if (!gameId) { alert('请填写游戏ID'); return false; }
      if (!age) { alert('请填写年龄'); return false; }
      if (!gender) { alert('请选择性别'); return false; }
      return true;
    }

    if (step === 2) {
      const ocClass = document.getElementById('f_class').value;
      const weapon = document.getElementById('f_weapon').value.trim();
      const weaponDesc = document.getElementById('f_weaponDesc').value.trim();
      const combatStyle = document.getElementById('f_combatStyle').value;
      const team = document.getElementById('f_team').value;
      const teamRole = document.getElementById('f_teamRole').value;
      const skills = getSkills();

      if (!ocClass) { alert('请选择职业'); return false; }
      if (!weapon) { alert('请填写武器名称'); return false; }
      if (!weaponDesc) { alert('请填写武器描述'); return false; }
      if (!combatStyle) { alert('请选择战斗风格'); return false; }
      if (skills.length === 0) { alert('至少填写 1 个标志技能'); return false; }
      if (!team) { alert('请选择战队'); return false; }
      if (!teamRole) { alert('请选择职位'); return false; }
      return true;
    }

    return true;
  }

  function getSkills() {
    return Array.from(document.querySelectorAll('.skill-input'))
      .map(input => input.value.trim())
      .filter(v => v);
  }

  function getRelations() {
    const rows = document.querySelectorAll('#relationInputs .relation-row');
    const rels = [];
    rows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      const name = inputs[0].value.trim();
      const desc = inputs[1].value.trim();
      if (name && desc) rels.push({ name, desc });
    });
    return rels;
  }

  function addRelation() {
    const container = document.getElementById('relationInputs');
    if (container.children.length >= 10) {
      alert('最多 10 条人际关系');
      return;
    }
    const row = document.createElement('div');
    row.className = 'relation-row';
    row.innerHTML = `
      <div class="form-group" style="margin-bottom:0;">
        <input type="text" placeholder="角色名">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <input type="text" placeholder="关系描述">
      </div>
      <button class="btn-remove" onclick="this.parentElement.remove()">删除</button>
    `;
    container.appendChild(row);
  }

  function previewFile(input, previewId) {
    const preview = document.getElementById(previewId);
    const file = input.files[0];
    if (!file) {
      preview.style.display = 'none';
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      preview.querySelector('img').src = e.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  async function submitOC() {
    if (!validateStep(2)) return;

    const avatarPreview = document.querySelector('#avatarPreview img');
    const illustPreview = document.querySelector('#illustPreview img');

    const data = {
      name: document.getElementById('f_name').value.trim(),
      gameId: document.getElementById('f_gameId').value.trim(),
      avatar: (avatarPreview && avatarPreview.src && document.getElementById('avatarPreview').style.display !== 'none') ? avatarPreview.src : '',
      illustration: (illustPreview && illustPreview.src && document.getElementById('illustPreview').style.display !== 'none') ? illustPreview.src : '',
      age: parseInt(document.getElementById('f_age').value),
      gender: document.querySelector('input[name="gender"]:checked').value,
      height: document.getElementById('f_height').value.trim(),
      birthday: document.getElementById('f_birthday').value.trim(),
      appearance: document.getElementById('f_appearance').value.trim(),
      personality: document.getElementById('f_personality').value.trim(),

      class: document.getElementById('f_class').value,
      weapon: document.getElementById('f_weapon').value.trim(),
      weaponType: document.getElementById('f_weaponType').value,
      weaponDesc: document.getElementById('f_weaponDesc').value.trim(),
      combatStyle: document.getElementById('f_combatStyle').value,
      signatureSkills: getSkills(),
      customSkill: document.getElementById('f_customSkill').value.trim(),
      team: document.getElementById('f_team').value,
      teamRole: document.getElementById('f_teamRole').value,

      bio: document.getElementById('f_bio').value.trim(),
      relationships: getRelations()
    };

    try {
      await createOC(data);
      clearDraft();
      alert('OC 创建成功！');
      window.location.href = 'oc-home.html';
    } catch (e) {
      alert('创建失败：' + e.message);
    }
  }

  // ===== 草稿箱 =====
  const DRAFT_KEY = 'glory_oc_draft';

  function collectFormData() {
    return {
      name: document.getElementById('f_name').value,
      gameId: document.getElementById('f_gameId').value,
      age: document.getElementById('f_age').value,
      gender: document.querySelector('input[name="gender"]:checked')?.value || '',
      height: document.getElementById('f_height').value,
      birthday: document.getElementById('f_birthday').value,
      appearance: document.getElementById('f_appearance').value,
      personality: document.getElementById('f_personality').value,
      class: document.getElementById('f_class').value,
      weapon: document.getElementById('f_weapon').value,
      weaponType: document.getElementById('f_weaponType').value,
      weaponDesc: document.getElementById('f_weaponDesc').value,
      combatStyle: document.getElementById('f_combatStyle').value,
      skills: getSkills(),
      customSkill: document.getElementById('f_customSkill').value,
      team: document.getElementById('f_team').value,
      teamRole: document.getElementById('f_teamRole').value,
      bio: document.getElementById('f_bio').value,
      relationships: getRelations()
    };
  }

  function saveDraft() {
    const data = collectFormData();
    localStorage.setItem(DRAFT_KEY, JSON.stringify(data));
    alert('草稿已保存');
  }

  function loadDraft() {
    try {
      const raw = localStorage.getItem(DRAFT_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      if (d.name) document.getElementById('f_name').value = d.name;
      if (d.gameId) document.getElementById('f_gameId').value = d.gameId;
      if (d.age) document.getElementById('f_age').value = d.age;
      if (d.gender) document.querySelector(`input[name="gender"][value="${d.gender}"]`).checked = true;
      if (d.height) document.getElementById('f_height').value = d.height;
      if (d.birthday) document.getElementById('f_birthday').value = d.birthday;
      if (d.appearance) document.getElementById('f_appearance').value = d.appearance;
      if (d.personality) document.getElementById('f_personality').value = d.personality;
      if (d.class) document.getElementById('f_class').value = d.class;
      if (d.weapon) document.getElementById('f_weapon').value = d.weapon;
      if (d.weaponType) document.getElementById('f_weaponType').value = d.weaponType;
      if (d.weaponDesc) document.getElementById('f_weaponDesc').value = d.weaponDesc;
      if (d.combatStyle) document.getElementById('f_combatStyle').value = d.combatStyle;
      if (d.customSkill) document.getElementById('f_customSkill').value = d.customSkill;
      if (d.team) document.getElementById('f_team').value = d.team;
      if (d.teamRole) document.getElementById('f_teamRole').value = d.teamRole;
      if (d.bio) document.getElementById('f_bio').value = d.bio;
      if (d.skills) {
        const inputs = document.querySelectorAll('.skill-input');
        d.skills.forEach((s, i) => { if (inputs[i]) inputs[i].value = s; });
      }
      if (d.relationships && d.relationships.length > 0) {
        const container = document.getElementById('relationInputs');
        container.innerHTML = '';
        d.relationships.forEach(r => {
          const row = document.createElement('div');
          row.className = 'relation-row';
          row.innerHTML = `
            <div class="form-group" style="margin-bottom:0;">
              <input type="text" placeholder="角色名" value="${escapeAttr(r.name)}">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <input type="text" placeholder="关系描述" value="${escapeAttr(r.desc)}">
            </div>
            <button class="btn-remove" onclick="this.parentElement.remove()">删除</button>
          `;
          container.appendChild(row);
        });
      }
    } catch (e) {}
  }

  function clearDraft() {
    localStorage.removeItem(DRAFT_KEY);
  }

  function escapeAttr(str) {
    return str.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // 页面加载时自动恢复草稿
  loadDraft();
</script>
</body>
</html>
