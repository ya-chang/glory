<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OC 详情 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
<meta property="og:title" content="OC 详情 · 荣耀社区">
<meta property="og:description" content="查看 OC 角色的详细设定和资料">
<meta property="og:image" content="https://ya-chang.github.io/glory/favicon.png">
<meta property="og:type" content="article">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="community.html" class="topbar-brand"><img src="favicon.png" alt="荣耀" class="brand-icon"> 荣耀社区</a>
    <button class="menu-toggle" onclick="document.querySelector('.topbar-nav').classList.toggle('open')">☰</button>
    <nav class="topbar-nav">
      <a href="community.html">首页</a>
      <a href="players.html">选手百科</a>
      <a href="teams.html">战队阵容</a>
      <a href="forum-home.html">讨论区</a>
      <a href="oc-home.html" class="active">OC中心</a>
    </nav>
    <div class="topbar-right">
      <a href="search.html" class="nav-text-btn">搜索</a>
      <a href="notifications.html" class="nav-text-btn">通知</a>
      <a href="profile.html" class="nav-text-btn">我的</a>
      <a href="index.html" class="btn-logout">退出</a>
    </div>
  </div>
</header>

<!-- Hero -->
<div class="oc-detail-hero" id="heroSection">
  <div class="container">
    <a href="oc-home.html" class="back">← 返回 OC 列表</a>
    <div class="oc-detail-header">
      <div class="oc-detail-avatar" id="detailAvatar"></div>
      <div class="oc-detail-meta">
        <h1 id="detailName"></h1>
        <div class="sub" id="detailSub"></div>
        <div class="tags" id="detailTags"></div>
        <div class="detail-actions" id="detailActions"></div>
      </div>
    </div>
  </div>
</div>

<!-- 主体 -->
<div class="detail-body" id="detailBody">
  <div class="detail-main">
    <!-- 立绘 -->
    <div id="illustrationWrap" style="display:none;"></div>

    <!-- 角色简介 -->
    <div class="info-card">
      <h2>角色简介</h2>
      <div class="bio-text" id="detailBio"></div>
    </div>

    <!-- 荣耀信息 -->
    <div class="info-card">
      <h2>荣耀信息</h2>
      <div id="detailGlory"></div>
    </div>

    <!-- 人际关系 -->
    <div class="info-card" id="relationsCard" style="display:none;">
      <h2>人际关系</h2>
      <div id="detailRelations"></div>
    </div>

    <!-- 评论区 -->
    <div class="info-card">
      <h2 id="commentTitle">评论</h2>
      <div class="comment-form">
        <textarea id="commentInput" placeholder="写下你的评论..."></textarea>
        <button class="btn btn-primary" onclick="addComment()">发送</button>
      </div>
      <div class="comments-section" id="commentsList"></div>
    </div>
  </div>

  <div class="detail-side">
    <!-- 基本信息 -->
    <div class="info-card">
      <h2>基本信息</h2>
      <div id="detailInfo"></div>
    </div>
  </div>
</div>

<!-- 404 -->
<div id="notFound" style="display:none;">
  <div class="oc-detail-hero">
    <div class="container" style="text-align:center;padding:60px 0;">
      <h2 style="color:var(--white);">未找到该 OC</h2>
      <a href="oc-home.html" style="color:rgba(255,255,255,0.7);margin-top:12px;display:inline-block;">← 返回 OC 列表</a>
    </div>
  </div>
</div>

<footer class="footer">
  <p>荣耀社区 · 全职高手同人站</p>
</footer>

<script src="common.js?v=2"></script>
<script src="oc.js?v=2"></script>
<script>
  const COMMENT_KEY = 'glory_oc_comments';
  const params = new URLSearchParams(window.location.search);
  const ocId = params.get('id');
  let oc = null;

  async function init() {
    oc = await getOCById(ocId);
    if (!oc) {
      document.getElementById('heroSection').style.display = 'none';
      document.getElementById('detailBody').style.display = 'none';
      document.getElementById('notFound').style.display = 'block';
      return;
    }
    document.title = `${oc.name} · OC 详情 · 荣耀社区`;
    renderDetail();
  }

  function renderDetail() {
    // 头像
    const avatarEl = document.getElementById('detailAvatar');
    if (oc.avatar) {
      avatarEl.innerHTML = `<img src="${oc.avatar}" alt="${oc.name}">`;
    } else {
      avatarEl.textContent = oc.gameId;
    }

    // 名字 & 副标题
    document.getElementById('detailName').textContent = oc.name;
    document.getElementById('detailSub').innerHTML = `${oc.gameId} · 创建者：<a href="user.html?email=${encodeURIComponent(oc.creatorId)}" class="user-link">${escapeForumHtml(oc.creatorName || '匿名')}</a>`;

    // 标签
    document.getElementById('detailTags').innerHTML = `
      <span class="tag">${oc.class}</span>
      <span class="tag">${oc.team}</span>
      <span class="tag">${oc.teamRole}</span>
    `;

    // 操作按钮（仅创建者可见）
    const user = getUser();
    const isOwner = user && user.email === oc.creatorId;
    document.getElementById('detailActions').innerHTML = isOwner ? `
      <a href="oc-edit.html?id=${oc.id}" class="btn btn-secondary" style="padding:6px 16px;font-size:13px;">编辑</a>
      <button class="btn btn-danger" style="padding:6px 16px;font-size:13px;" onclick="deleteOCConfirm()">删除</button>
    ` : '';

    // 立绘
    if (oc.illustration) {
      document.getElementById('illustrationWrap').style.display = 'block';
      document.getElementById('illustrationWrap').innerHTML = `
        <div class="oc-illustration">
          <img src="${oc.illustration}" alt="${oc.name} 立绘">
        </div>`;
    }

    // 简介
    if (oc.bio) {
      document.getElementById('detailBio').textContent = oc.bio;
    } else {
      document.getElementById('detailBio').parentElement.style.display = 'none';
    }

    // 荣耀信息
    const gloryRows = [
      ['职业', oc.class],
      ['武器', `${oc.weapon}（${oc.weaponType}）`],
      ['武器描述', oc.weaponDesc],
      ['战斗风格', oc.combatStyle],
      ['标志技能', (oc.signatureSkills || []).join('、')],
      ['自创技能', oc.customSkill || '—'],
      ['所属战队', oc.team],
      ['职位', oc.teamRole]
    ];
    document.getElementById('detailGlory').innerHTML = gloryRows
      .filter(([_, v]) => v && v !== '—')
      .map(([l, v]) => `<div class="info-row"><span class="label">${l}</span><span class="value">${v}</span></div>`)
      .join('');

    // 基本信息
    const infoRows = [
      ['角色名', oc.name],
      ['游戏ID', oc.gameId],
      ['年龄', oc.age],
      ['性别', genderText(oc.gender)],
      ['身高', oc.height],
      ['生日', oc.birthday],
      ['外貌', oc.appearance],
      ['性格', oc.personality]
    ];
    document.getElementById('detailInfo').innerHTML = infoRows
      .filter(([_, v]) => v)
      .map(([l, v]) => `<div class="info-row"><span class="label">${l}</span><span class="value">${v}</span></div>`)
      .join('');

    // 人际关系
    if (oc.relationships && oc.relationships.length > 0) {
      document.getElementById('relationsCard').style.display = 'block';
      document.getElementById('detailRelations').innerHTML = oc.relationships.map(r =>
        `<div class="relation-item">
          <div class="relation-avatar">${r.name[0]}</div>
          <div class="relation-info">
            <div class="name">${r.name}</div>
            <div class="desc">${r.desc}</div>
          </div>
        </div>`
      ).join('');
    }

    // 评论
    renderComments();
  }

  function getComments() {
    try {
      const data = localStorage.getItem(COMMENT_KEY);
      const all = data ? JSON.parse(data) : {};
      return all[ocId] || [];
    } catch (e) { return []; }
  }

  function saveComments(list) {
    try {
      const data = localStorage.getItem(COMMENT_KEY);
      const all = data ? JSON.parse(data) : {};
      all[ocId] = list;
      localStorage.setItem(COMMENT_KEY, JSON.stringify(all));
    } catch (e) {}
  }

  function renderComments() {
    const comments = getComments();
    document.getElementById('commentTitle').textContent = `评论（${comments.length}）`;
    const list = document.getElementById('commentsList');
    if (comments.length === 0) {
      list.innerHTML = '<p style="font-size:13px;color:var(--text-3);padding:16px 0;">暂无评论</p>';
      return;
    }
    list.innerHTML = comments.map(c => `
      <div class="comment">
        <div class="comment-avatar">${c.author[0]}</div>
        <div class="comment-body">
          <div class="comment-header">
            <span class="author">${c.author}</span> · ${forumTimeAgo(c.time)}
          </div>
          <div class="comment-text">${escapeForumHtml(c.text)}</div>
        </div>
      </div>
    `).join('');
  }

  function addComment() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!text) return;
    const user = getUser();
    const author = user ? user.username : '匿名用户';
    const comments = getComments();
    comments.push({
      author: author,
      text: text,
      time: new Date().toISOString()
    });
    saveComments(comments);
    input.value = '';
    renderComments();
  }

  async function deleteOCConfirm() {
    if (confirm('确定删除这个 OC 吗？此操作不可恢复。')) {
      try {
        await deleteOC(ocId);
        window.location.href = 'oc-home.html';
      } catch (e) {
        alert('删除失败：' + e.message);
      }
    }
  }

  init();
</script>
</body>
</html>
